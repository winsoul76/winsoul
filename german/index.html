<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>윈솔캘리 독일어 — A1부터 C1까지</title>
<style>
:root{
  --bg:#f7f4ee; --card:#ffffff; --ink:#20242b; --muted:#6b7280; --line:#e7e1d4;
  --accent:#a91d3a; --gold:#b8892b; --good:#2f7d4f; --bad:#b3401f; --radius:16px; --fs:17px;
}
*{box-sizing:border-box;}
html{font-size:var(--fs); scroll-behavior:smooth;}
body{ margin:0; background:var(--bg); color:var(--ink);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.65; padding-bottom:60px; }
h1,h2,h3,h4{ line-height:1.35; margin:0 0 .5em; }
p{margin:.4em 0;}
a{color:var(--accent);}
button{font-family:inherit; cursor:pointer;}
header{ position:sticky; top:0; z-index:50; background:linear-gradient(135deg,#1c1e26,#2b2130); color:#fdfaf3; padding:.7rem 1rem; box-shadow:0 2px 10px rgba(0,0,0,.15); }
.header-row{ display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; max-width:1100px; margin:0 auto; }
.brand{ display:flex; align-items:center; gap:.5rem; font-weight:800; font-size:1.05rem; white-space:nowrap; }
.brand .flag{ display:inline-flex; width:1.4em; height:1em; border-radius:3px; overflow:hidden; flex-direction:column; box-shadow:0 0 0 1px rgba(255,255,255,.2);}
.brand .flag div{flex:1;}
nav.mainnav{ display:flex; gap:.3rem; flex-wrap:wrap; }
nav.mainnav button{ background:rgba(255,255,255,.08); color:#fdfaf3; border:1px solid rgba(255,255,255,.15); padding:.4rem .75rem; border-radius:999px; font-size:.85rem; font-weight:600; transition:.15s; }
nav.mainnav button:hover{ background:rgba(255,255,255,.2); }
nav.mainnav button.active{ background:var(--accent); border-color:var(--accent); }
main{ max-width:900px; margin:0 auto; padding:1.4rem 1rem 3rem; }
.hero{ text-align:center; padding:1.6rem 1rem 2rem; }
.hero h1{ font-size:1.9rem; }
.hero p.lead{ color:var(--muted); max-width:640px; margin:.6rem auto 0; }
.level-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1rem; margin:1.6rem 0; }
.level-card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:1.2rem 1rem; cursor:pointer; transition:.15s; text-align:left; }
.level-card:hover{ transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,.08); }
.level-card .badge{ display:inline-block; font-weight:800; font-size:1.2rem; padding:.15rem .6rem; border-radius:8px; color:#fff; margin-bottom:.5rem; }
.level-card h3{ font-size:1rem; margin-bottom:.3rem; }
.level-card p{ color:var(--muted); font-size:.85rem; }
.card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:1.2rem 1.2rem; margin-bottom:1.1rem; }
.card h2{ font-size:1.15rem; }
.guide-box{ background:#fbf6e9; border:1px solid #ecd9a0; border-radius:var(--radius); padding:1rem 1.2rem; margin:1rem 0; }
.guide-box h3{ margin-top:0; color:var(--gold); }
.level-header{ display:flex; align-items:center; gap:.8rem; margin-bottom:1rem; flex-wrap:wrap;}
.level-header .badge{ font-weight:800; font-size:1.4rem; padding:.2rem .7rem; border-radius:10px; color:#fff; }
.level-header .goal{ color:var(--muted); font-size:.92rem; }
.subtabs{ display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:1.2rem; border-bottom:2px solid var(--line); padding-bottom:.6rem;}
.subtabs button{ background:transparent; border:1px solid var(--line); padding:.45rem 1rem; border-radius:999px; font-size:.88rem; font-weight:600; color:var(--ink); }
.subtabs button.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
.unit-block{ margin-bottom:1.8rem; }
.unit-tag{ display:inline-block; background:var(--gold); color:#fff; font-size:.75rem; font-weight:800; padding:.2rem .6rem; border-radius:6px; margin-bottom:.5rem;}
.unit-block h3{ font-size:1.15rem; margin-top:.1rem;}
.core-box{ background:#fbf1ec; border-left:4px solid var(--accent); padding:.6rem .9rem; border-radius:8px; margin:.6rem 0; font-size:.94rem;}
.why-box{ background:#eef3f6; border-left:4px solid #3a6ea5; padding:.6rem .9rem; border-radius:8px; margin:.6rem 0; font-size:.92rem; }
.tip-box{ background:#eef7ee; border-left:4px solid var(--good); padding:.6rem .9rem; border-radius:8px; margin:.6rem 0; font-size:.92rem; }
.video-inline{ display:flex; gap:.6rem; align-items:center; background:#fff7e6; border:1px solid #f0dca0; border-radius:10px; padding:.55rem .8rem; margin:.6rem 0; font-size:.87rem;}
.video-inline .yt{ font-size:1.1rem; }
.video-inline a{ font-weight:700; }
.video-inline span.d{ color:var(--muted); display:block; font-size:.8rem; }
.tbl-wrap{ overflow-x:auto; margin:.7rem 0; }
table{ border-collapse:collapse; width:100%; font-size:.9rem; }
th,td{ border:1px solid var(--line); padding:.4rem .6rem; text-align:left; white-space:nowrap; }
th{ background:#f1ece0; }
.ex-list{ margin:.6rem 0; }
.ex-item{ display:flex; align-items:flex-start; gap:.5rem; padding:.35rem 0; border-bottom:1px dashed var(--line); }
.ex-item:last-child{ border-bottom:none; }
.ex-de{ font-weight:700; }
.ex-ko{ color:var(--muted); font-size:.88rem; }
.mistake-list{ margin:.6rem 0; }
.mistake-item{ padding:.4rem 0; border-bottom:1px dashed var(--line); font-size:.92rem;}
.mistake-item:last-child{border-bottom:none;}
.wrong{ color:var(--bad); font-weight:700; }
.right{ color:var(--good); font-weight:700; }
.mnote{ color:var(--muted); font-size:.85rem; display:block; margin-top:.15rem;}
.tts{ border:none; background:#f1ece0; border-radius:50%; width:1.9rem; height:1.9rem; flex:none; font-size:.85rem; }
.tts:hover{ background:var(--gold); }
.tts:active{ transform:scale(.92); }
.vocab-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:.6rem; }
.vword{ background:#fbfaf6; border:1px solid var(--line); border-radius:10px; padding:.6rem .7rem; }
.vword .de{ font-weight:700; display:flex; align-items:center; gap:.4rem; }
.vword .ko{ color:var(--muted); font-size:.88rem; margin:.15rem 0;}
.vword .ex{ font-size:.82rem; color:#555; border-top:1px dashed var(--line); margin-top:.35rem; padding-top:.35rem; display:flex; gap:.35rem; align-items:flex-start;}
.idiom-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:.6rem; margin-bottom:.8rem;}
.idiom{ background:#f4eefc; border:1px solid #e2d3f5; border-radius:10px; padding:.6rem .7rem; }
.idiom .de{ font-weight:700; display:flex; gap:.4rem; align-items:center;}
.idiom .ko{ color:#6b5a80; font-size:.88rem; margin:.15rem 0;}
.idiom .ex{ font-size:.82rem; color:#555; border-top:1px dashed #e2d3f5; margin-top:.35rem; padding-top:.35rem;}
.dialog{ background:#fbfaf6; border:1px solid var(--line); border-radius:12px; padding:1rem 1.1rem; margin-bottom:.6rem; }
.dialog h4{ margin-top:0; font-size:1rem; }
.dline{ display:flex; gap:.6rem; align-items:flex-start; padding:.4rem 0; border-bottom:1px dashed var(--line); }
.dline:last-child{ border-bottom:none; }
.sp{ font-weight:800; color:var(--accent); width:1.4rem; flex:none; }
.dtext .de{ font-weight:600; }
.dtext .ko{ color:var(--muted); font-size:.85rem; }
.quiz-item{ background:#fbfaf6; border:1px solid var(--line); border-radius:12px; padding:.8rem 1rem; margin-bottom:.8rem; }
.quiz-q{ font-weight:600; margin-bottom:.5rem; }
.quiz-row{ display:flex; gap:.5rem; flex-wrap:wrap; }
.quiz-row input{ flex:1; min-width:160px; padding:.5rem .6rem; border:1px solid var(--line); border-radius:8px; font-size:.95rem; }
.quiz-row button{ background:var(--accent); color:#fff; border:none; border-radius:8px; padding:.5rem 1rem; font-weight:700; font-size:.88rem;}
.quiz-feedback{ margin-top:.6rem; padding:.55rem .75rem; border-radius:8px; font-size:.9rem; display:none; }
.quiz-feedback.show{ display:block; }
.quiz-feedback.ok{ background:#e7f5ec; color:var(--good); }
.quiz-feedback.no{ background:#fdece5; color:var(--bad); }
.roadmap-wrap{ overflow-x:auto; }
.pill{ display:inline-block; padding:.1rem .5rem; border-radius:6px; font-size:.72rem; font-weight:700; color:#fff; }
footer{ text-align:center; color:var(--muted); font-size:.8rem; padding:2rem 1rem 1rem; }
/* floating controls */
.floating-controls{ position:fixed; right:1rem; bottom:1rem; display:flex; flex-direction:column; gap:.5rem; z-index:80; align-items:center; }
.floating-controls button{ width:2.6rem; height:2.6rem; border-radius:50%; border:none; background:var(--ink); color:#fff; font-size:.95rem; font-weight:700; box-shadow:0 6px 16px rgba(0,0,0,.28); opacity:.55; transition:.2s; }
.floating-controls button:hover{ opacity:1; transform:translateY(-2px); }
.floating-controls button.dim{ opacity:.25; pointer-events:none; }
@media (max-width:560px){
  .header-row{ justify-content:center; } nav.mainnav{ justify-content:center; }
  th,td{ font-size:.82rem; padding:.3rem .4rem; }
}
</style>
</head>

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function tbl(headers, rows){
  var h = headers.map(function(x){return "<th>"+esc(x)+"</th>";}).join("");
  var b = rows.map(function(r){ return "<tr>"+r.map(function(c){return "<td>"+c+"</td>";}).join("")+"</tr>"; }).join("");
  return '<div class="tbl-wrap"><table><thead><tr>'+h+'</tr></thead><tbody>'+b+'</tbody></table></div>';
}

    ["과거","회화=Perfekt. 이동·변화 동사는 sein(bin gegangen)."],
    ["관계문","성·수=앞 명사, 격=관계문 속 역할, 동사 맨 뒤."],
    ["정중·가정","würde/könnte/hätte."],
    ["B2 문체","명사화·분사·je…desto·간접화법."],
    ["C1 문체","확장분사구·Nominalstil·Modalpartikeln(doch/ja/eben/halt)."]
  ]
};

/* ===================== 렌더링 엔진 ===================== */
var state = { route:"home", subtab:"grammar" };
function levelBadge(lv){ return '<span class="badge" style="background:'+LEVEL_COLOR[lv]+'">'+lv+'</span>'; }

function renderNav(){
  var items = [["home","홈"]].concat(LEVEL_ORDER.map(function(l){return [l,l];})).concat([["appendix","문법 요약표"]]);
  document.getElementById("mainnav").innerHTML = items.map(function(it){
    var active = (state.route===it[0]) ? " active" : "";
    return '<button class="'+active.trim()+'" data-route="'+it[0]+'">'+it[1]+'</button>';
  }).join("");
}

function buildRoadmap(){
  var rows = []; var wk = 1;
  LEVEL_ORDER.forEach(function(lv){
    DATA[lv].units.forEach(function(u){
      var w1 = wk, w2 = wk+1;
      rows.push([w1+"~"+w2+"주", '<span class="pill" style="background:'+LEVEL_COLOR[lv]+'">'+lv+'</span>', esc(u.grammar.t), esc(u.vocabTheme||""), esc(u.convTheme||"")]);
      wk += 2;
    });
  });
  return rows;
}

function renderHome(){
  var cards = LEVEL_ORDER.map(function(lv){
    var d = DATA[lv];
    return '<div class="level-card" data-goto="'+lv+'">'+
      '<span class="badge" style="background:'+LEVEL_COLOR[lv]+'">'+lv+'</span>'+
      '<h3>'+esc(d.title)+'</h3><p>'+esc(d.blurb)+'</p></div>';
  }).join("");
  var roadmapRows = buildRoadmap();
  return ''+
  '<div class="hero"><h1>독일어, 처음부터 C1까지</h1>'+
  '<p class="lead">독일어를 한 글자도 몰라도 괜찮습니다. 독일에 막 도착한 날부터 C1 시험장 앞에 서는 날까지, 52주 커리큘럼으로 안내하는 쪽집게 과외입니다. 레벨을 선택해 시작하세요.</p></div>'+
  '<div class="level-grid">'+cards+'</div>'+
  '<div class="guide-box"><h3>이 사이트 사용법</h3>'+
  '<p><b>매주 이렇게</b> ① 이번 주 문법을 천천히 읽고 🔊로 예문을 들으며 따라 읽기 → ② 실수 박스에서 함정 확인 → ③ 관용구·단어를 예문과 함께 소리 내어 외우기 → ④ 회화를 실제로 말해보기 → ⑤ 퀴즈로 확인, 틀리면 즉시 정답과 해설 확인.</p>'+
  '<p><b>왜 이렇게 공부하나요?</b> 문법은 암기가 아니라 패턴 인식입니다. 매주 하나의 핵심 문법 + 관용구 + 단어 + 회화를 반복하면, 52주 뒤에는 '+"'"+'틀린 문장이 어색하게 느껴지는'+"'"+' 감각, 즉 C1의 감각이 생깁니다.</p></div>'+
  '<div class="card"><h2>52주 전체 로드맵</h2><div class="roadmap-wrap">'+
  tbl(["주차","레벨","문법 핵심","단어 테마","회화 테마"], roadmapRows)+
  '</div><p style="color:var(--muted); font-size:.85rem;">하루 40~60분, 주 5일 기준. 각 유닛은 2주 분량이며 문법·단어·회화 각 섹션에 그 주에 맞는 학습 영상 링크가 함께 제공됩니다.</p></div>';
}

function renderUnit(u, idx, wk){
  var g = u.grammar;
  var html = '<div class="unit-block">';
  html += '<span class="unit-tag">'+esc(u.weekLabel)+' · '+esc(g.tag)+'</span><h3>'+esc(g.t)+'</h3>';
  g.body.forEach(function(p){ html += "<p>"+esc(p)+"</p>"; });
  if(g.table){ html += "<p><b>"+esc(g.table.caption)+"</b></p>"+tbl(g.table.headers, g.table.rows.map(function(r){return r.map(function(c){return esc(c);});})); }
  if(g.examples && g.examples.length){
    html += '<div class="ex-list">';
    g.examples.forEach(function(ex){ html += '<div class="ex-item">'+ttsBtn(ex[0])+'<div><div class="ex-de">'+esc(ex[0])+'</div><div class="ex-ko">'+esc(ex[1])+'</div></div></div>'; });
    html += '</div>';
  }
  if(g.why){ html += '<div class="why-box"><b>왜?</b> '+esc(g.why)+'</div>'; }
  if(g.mistakes && g.mistakes.length){
    html += '<div class="mistake-list"><p><b>자주 하는 실수</b></p>';
    g.mistakes.forEach(function(m){ html += '<div class="mistake-item"><span class="wrong">✕ '+esc(m[0])+'</span> → <span class="right">✓ '+esc(m[1])+'</span><span class="mnote">'+esc(m[2])+'</span></div>'; });
    html += '</div>';
  }
  if(g.video){ html += videoInline(g.video); }
  if(g.quiz && g.quiz.length){
    html += '<div class="core-box"><b>확인 문제</b></div>'+renderQuizList(g.quiz, "gq");
  }
  html += '</div>';
  return html;
}

function renderUnitVocab(u){
  var html = '<div class="unit-block"><span class="unit-tag">'+esc(u.weekLabel)+'</span><h3>'+esc(u.vocabTheme||"단어·관용구")+'</h3>';
  if(u.idioms && u.idioms.length){
    html += '<p><b>핵심 관용구</b></p><div class="idiom-grid">';
    u.idioms.forEach(function(it){
      html += '<div class="idiom"><div class="de">'+ttsBtn(it[0])+' '+esc(it[0])+'</div><div class="ko">'+esc(it[1])+'</div>'+(it[2]?'<div class="ex">'+ttsBtn(it[2])+' '+esc(it[2])+'</div>':'')+'</div>';
    });
    html += '</div>';
  }
  if(u.vocab && u.vocab.length){
    html += '<p><b>단어</b></p><div class="vocab-grid">';
    u.vocab.forEach(function(it){
      html += '<div class="vword"><div class="de">'+ttsBtn(it[0])+' '+esc(it[0])+'</div><div class="ko">'+esc(it[1])+'</div>'+(it[2]?'<div class="ex">'+ttsBtn(it[2])+' <span>'+esc(it[2])+'</span></div>':'')+'</div>';
    });
    html += '</div>';
  }
  if(u.videoVocab){ html += videoInline(u.videoVocab); }
  html += '</div>';
  return html;
}

var dialogCounter = 0;
function renderUnitConversation(u){
  var html = '<div class="unit-block"><span class="unit-tag">'+esc(u.weekLabel)+'</span><h3>'+esc(u.convTheme||"회화")+'</h3>';
  if(u.conversation){
    html += '<div class="dialog"><h4>'+esc(u.conversation.t)+'</h4>';
    u.conversation.lines.forEach(function(line){
      html += '<div class="dline"><span class="sp">'+esc(line[0])+'</span><div class="dtext"><div class="de">'+ttsBtn(line[1])+' '+esc(line[1])+'</div>'+(line[2]?'<div class="ko">'+esc(line[2])+'</div>':'')+'</div></div>';
    });
    html += '</div>';
  }
  if(u.videoConversation){ html += videoInline(u.videoConversation); }
  html += '</div>';
  return html;
}

var quizCounter = 0;
function renderQuizList(list, prefix){
  var html = "";
  list.forEach(function(item){
    quizCounter++;
    var id = prefix+"_"+quizCounter;
    html += '<div class="quiz-item"><div class="quiz-q">Q. '+esc(item.q)+'</div>'+
      '<div class="quiz-row"><input type="text" id="in_'+id+'" placeholder="정답을 입력해보세요 (몰라도 확인을 눌러보세요)">'+
      '<button data-check="'+id+'" data-answer="'+escAttr(item.a)+'" data-note="'+escAttr(item.note||"")+'">확인</button></div>'+
      '<div class="quiz-feedback" id="fb_'+id+'"></div></div>';
  });
  return html;
}
function normalizeAnswer(s){ return s.toLowerCase().replace(/[.,!?„“"'’()]/g,"").replace(/\s+/g," ").trim(); }

function renderAppendix(){
  var html = '<div class="hero"><h1>문법 요약표 · 부록</h1><p class="lead">막히면 여기부터 다시 보세요.</p></div>';
  html += '<div class="card"><h2>'+APPENDIX.irregular.caption+'</h2>'+tbl(APPENDIX.irregular.headers, APPENDIX.irregular.rows)+'</div>';
  html += '<div class="card"><h2>격(Kasus)과 형용사 어미</h2>'+tbl(APPENDIX.defArt.headers, APPENDIX.defArt.rows)+tbl(APPENDIX.adjEnding.headers, APPENDIX.adjEnding.rows)+'</div>';
  html += '<div class="card"><h2>연결어 분류</h2>'+tbl(APPENDIX.connectors.headers, APPENDIX.connectors.rows)+'</div>';
  html += '<div class="card"><h2>핵심 한 장 정리</h2>'+tbl(["주제","한 줄 핵심"], APPENDIX.summary)+'</div>';
  return html;
}

function renderExam(ex){
  var html = '<div class="card"><h2>시험 한눈에 보기</h2><p>'+esc(ex.intro)+'</p>'+tbl(ex.table.headers, ex.table.rows)+
    '<p style="color:var(--muted); font-size:.88rem;">'+esc(ex.note)+'</p></div>';
  html += '<div class="card"><h2>쓰기 전략</h2>'+tbl(ex.writingTable.headers, ex.writingTable.rows)+'<div class="core-box">'+esc(ex.writingTask)+'</div></div>';
  html += '<div class="card"><h2>말하기 전략</h2>'+tbl(ex.speakingTable.headers, ex.speakingTable.rows)+'<div class="core-box">'+esc(ex.speakingTask)+'</div></div>';
  html += '<div class="card"><h2>공식 자료</h2>'+ex.links.map(function(v){return videoInline(v);}).join("")+'</div>';
  return html;
}

function renderLevelPage(lv){
  var d = DATA[lv];
  var subtabs = [["grammar","문법"],["vocab","단어·관용구"],["conversation","회화"],["quiz","퀴즈"]];
  if(d.exam) subtabs.push(["exam","시험대비"]);
  var html = '<div class="level-header">'+levelBadge(lv)+'<div><h2 style="margin:0">'+esc(d.title)+'</h2><div class="goal">'+esc(d.blurb)+' ('+esc(d.weeksRange)+')</div></div></div>';
  html += '<div class="subtabs">';
  subtabs.forEach(function(st){
    var active = (state.subtab===st[0]) ? " active" : "";
    html += '<button class="'+active.trim()+'" data-subtab="'+st[0]+'">'+st[1]+'</button>';
  });
  html += '</div><div id="subcontent">';
  quizCounter = 0; dialogCounter = 0;
  if(state.subtab==="grammar"){
    d.units.forEach(function(u,i){ html += renderUnit(u,i); });
  } else if(state.subtab==="vocab"){
    d.units.forEach(function(u){ html += renderUnitVocab(u); });
  } else if(state.subtab==="conversation"){
    d.units.forEach(function(u){ html += renderUnitConversation(u); });
  } else if(state.subtab==="quiz"){
    html += '<div class="card"><h2>'+lv+' 총정리 퀴즈</h2>'+renderQuizList(d.quiz||[], "lq_"+lv)+'</div>';
  } else if(state.subtab==="exam" && d.exam){
    html += renderExam(d.exam);
  }
  html += '</div>';
  return html;
}

function render(){
  renderNav();
  var el = document.getElementById("content");
  if(state.route==="home"){ el.innerHTML = renderHome(); }
  else if(state.route==="appendix"){ el.innerHTML = renderAppendix(); }
  else if(DATA[state.route]){ el.innerHTML = renderLevelPage(state.route); }
  else { el.innerHTML = renderHome(); }
  window.scrollTo({top:0, behavior:"auto"});
}

document.addEventListener("click", function(e){
  var navBtn = e.target.closest("[data-route]");
  if(navBtn){ state.route = navBtn.getAttribute("data-route"); if(DATA[state.route]) state.subtab="grammar"; saveState(); render(); return; }
  var goCard = e.target.closest("[data-goto]");
  if(goCard){ state.route = goCard.getAttribute("data-goto"); state.subtab="grammar"; saveState(); render(); return; }
  var subBtn = e.target.closest("[data-subtab]");
  if(subBtn){ state.subtab = subBtn.getAttribute("data-subtab"); render(); return; }
  var ttsBtnEl = e.target.closest(".tts");
  if(ttsBtnEl){ speakDE(ttsBtnEl.getAttribute("data-tts")); return; }
  var checkBtn = e.target.closest("[data-check]");
  if(checkBtn){
    var id = checkBtn.getAttribute("data-check");
    var answer = checkBtn.getAttribute("data-answer");
    var note = checkBtn.getAttribute("data-note");
    var input = document.getElementById("in_"+id);
    var fb = document.getElementById("fb_"+id);
    var userVal = input ? input.value : "";
    var accepted = answer.split("|").map(normalizeAnswer);
    var norm = normalizeAnswer(userVal);
    var isCorrect = norm.length>0 && accepted.indexOf(norm) !== -1;
    fb.className = "quiz-feedback show " + (isCorrect ? "ok" : "no");
    fb.innerHTML = "<b>"+(isCorrect ? "✓ 정답입니다!" : (norm.length>0 ? "✗ 다시 확인해보세요" : "정답 확인"))+"</b>"+
      '<div style="margin-top:.3rem;">정답: <b>'+esc(answer.replace(/\|/g," / "))+'</b> '+ttsBtn(answer.split("|")[0])+'</div>'+
      (note ? '<div style="margin-top:.2rem; color:var(--muted);">'+esc(note)+'</div>' : "");
    return;
  }
});
document.addEventListener("keydown", function(e){
  if(e.key==="Enter" && e.target.tagName==="INPUT" && e.target.id.indexOf("in_")===0){
    var row = e.target.closest(".quiz-row");
    if(row){ var btn = row.querySelector("[data-check]"); if(btn) btn.click(); }
  }
});

/* TTS */
var germanVoice = null;
function pickVoice(){ if(!window.speechSynthesis) return; var voices = speechSynthesis.getVoices(); germanVoice = voices.find(function(v){ return v.lang && v.lang.toLowerCase().indexOf("de")===0; }) || null; }
if(window.speechSynthesis){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speakDE(text){
  if(!window.speechSynthesis){ alert("이 브라우저는 음성 합성을 지원하지 않습니다."); return; }
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text); u.lang = "de-DE"; u.rate = 0.92;
  if(germanVoice) u.voice = germanVoice;
  speechSynthesis.speak(u);
}

/* 글자 크기 (floating) */
function applyFontSize(px){ document.documentElement.style.fontSize = px+"px"; try{ localStorage.setItem("de_fs", px); }catch(e){} }
document.getElementById("fsUp").addEventListener("click", function(){ var cur = parseInt(getComputedStyle(document.documentElement).fontSize,10)||17; applyFontSize(Math.min(cur+1,24)); });
document.getElementById("fsDown").addEventListener("click", function(){ var cur = parseInt(getComputedStyle(document.documentElement).fontSize,10)||17; applyFontSize(Math.max(cur-1,13)); });
document.getElementById("fsReset").addEventListener("click", function(){ applyFontSize(17); });

/* 맨 위로 (floating) */
var toTopBtn = document.getElementById("toTop");
window.addEventListener("scroll", function(){
  if(window.scrollY > 350) toTopBtn.classList.remove("dim"); else toTopBtn.classList.add("dim");
});
toTopBtn.addEventListener("click", function(){ window.scrollTo({top:0, behavior:"smooth"}); });

/* 상태 저장 */
function saveState(){ try{ localStorage.setItem("de_route", state.route); }catch(e){} }
function loadState(){
  try{
    var savedFs = localStorage.getItem("de_fs"); if(savedFs) document.documentElement.style.fontSize = savedFs+"px";
    var savedRoute = localStorage.getItem("de_route");
    if(savedRoute && (DATA[savedRoute] || savedRoute==="home" || savedRoute==="appendix")){ state.route = savedRoute; }
  }catch(e){}
}
loadState();
render();
</script>
