<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SY의 독일어 공부방 · A1 → B2</title>
<style>
:root{
  --bg:#f7f4ee;
  --card:#ffffff;
  --ink:#20242b;
  --muted:#6b7280;
  --line:#e7e1d4;
  --accent:#a91d3a;
  --accent-ink:#ffffff;
  --gold:#b8892b;
  --good:#2f7d4f;
  --bad:#b3401f;
  --radius:16px;
  --fs:17px;
}
*{box-sizing:border-box;}
html{font-size:var(--fs); scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.65;
  padding-bottom:60px;
}
h1,h2,h3,h4{ line-height:1.35; margin:0 0 .5em; }
p{margin:.4em 0;}
a{color:var(--accent);}
button{font-family:inherit; cursor:pointer;}

/* header */
header{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(135deg,#1c1e26,#2b2130);
  color:#fdfaf3;
  padding:.7rem 1rem;
  box-shadow:0 2px 10px rgba(0,0,0,.15);
}
.header-row{ display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; max-width:1100px; margin:0 auto; }
.brand{ display:flex; align-items:center; gap:.5rem; font-weight:800; font-size:1.05rem; white-space:nowrap; }
.brand .flag{ display:inline-flex; width:1.4em; height:1em; border-radius:3px; overflow:hidden; flex-direction:column; box-shadow:0 0 0 1px rgba(255,255,255,.2);}
.brand .flag div{flex:1;}
nav.mainnav{ display:flex; gap:.3rem; flex-wrap:wrap; }
nav.mainnav button{
  background:rgba(255,255,255,.08); color:#fdfaf3; border:1px solid rgba(255,255,255,.15);
  padding:.4rem .75rem; border-radius:999px; font-size:.85rem; font-weight:600; transition:.15s;
}
nav.mainnav button:hover{ background:rgba(255,255,255,.2); }
nav.mainnav button.active{ background:var(--accent); border-color:var(--accent); }
.tools{ display:flex; align-items:center; gap:.35rem; }
.tools button{
  background:rgba(255,255,255,.08); color:#fdfaf3; border:1px solid rgba(255,255,255,.2);
  width:2.1rem; height:2.1rem; border-radius:50%; font-size:.85rem; font-weight:700;
}
.tools button:hover{ background:rgba(255,255,255,.22); }
.tools .fs-label{ font-size:.72rem; color:#d8d2c4; padding:0 .2rem; }

main{ max-width:900px; margin:0 auto; padding:1.4rem 1rem 3rem; }

/* home */
.hero{ text-align:center; padding:1.6rem 1rem 2rem; }
.hero h1{ font-size:1.9rem; }
.hero p.lead{ color:var(--muted); max-width:640px; margin:.6rem auto 0; }

.level-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; margin:1.6rem 0; }
.level-card{
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
  padding:1.3rem 1.1rem; cursor:pointer; transition:.15s; text-align:left; position:relative; overflow:hidden;
}
.level-card:hover{ transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,.08); }
.level-card .badge{ display:inline-block; font-weight:800; font-size:1.3rem; padding:.15rem .6rem; border-radius:8px; color:#fff; margin-bottom:.5rem; }
.level-card h3{ font-size:1.05rem; margin-bottom:.3rem; }
.level-card p{ color:var(--muted); font-size:.88rem; }

.card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:1.2rem 1.2rem; margin-bottom:1.1rem; }
.card h2{ font-size:1.15rem; }
.card h3{ font-size:1rem; color:var(--accent); }

.guide-box{ background:#fbf6e9; border:1px solid #ecd9a0; border-radius:var(--radius); padding:1rem 1.2rem; margin:1rem 0; }
.guide-box h3{ margin-top:0; color:var(--gold); }

/* level page */
.level-header{ display:flex; align-items:center; gap:.8rem; margin-bottom:1rem; flex-wrap:wrap;}
.level-header .badge{ font-weight:800; font-size:1.4rem; padding:.2rem .7rem; border-radius:10px; color:#fff; }
.level-header .goal{ color:var(--muted); font-size:.92rem; }

.subtabs{ display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:1.2rem; border-bottom:2px solid var(--line); padding-bottom:.6rem;}
.subtabs button{
  background:transparent; border:1px solid var(--line); padding:.45rem 1rem; border-radius:999px;
  font-size:.88rem; font-weight:600; color:var(--ink);
}
.subtabs button.active{ background:var(--ink); color:#fff; border-color:var(--ink); }

/* grammar */
.gram-topic{ margin-bottom:1.6rem; }
.gram-topic .tag{ display:inline-block; background:var(--gold); color:#fff; font-size:.72rem; font-weight:700; padding:.15rem .55rem; border-radius:6px; margin-bottom:.4rem;}
.gram-topic h3{ font-size:1.15rem; margin-top:.1rem;}
.core-box{ background:#fbf1ec; border-left:4px solid var(--accent); padding:.6rem .9rem; border-radius:8px; margin:.6rem 0; font-size:.94rem;}
.why-box{ background:#eef3f6; border-left:4px solid #3a6ea5; padding:.6rem .9rem; border-radius:8px; margin:.6rem 0; font-size:.92rem; }
.tip-box{ background:#eef7ee; border-left:4px solid var(--good); padding:.6rem .9rem; border-radius:8px; margin:.6rem 0; font-size:.92rem; }

.tbl-wrap{ overflow-x:auto; margin:.7rem 0; }
table{ border-collapse:collapse; width:100%; font-size:.9rem; }
th,td{ border:1px solid var(--line); padding:.4rem .6rem; text-align:left; white-space:nowrap; }
th{ background:#f1ece0; }

.ex-list{ margin:.6rem 0; }
.ex-item{ display:flex; align-items:flex-start; gap:.5rem; padding:.35rem 0; border-bottom:1px dashed var(--line); }
.ex-item:last-child{ border-bottom:none; }
.ex-de{ font-weight:700; }
.ex-ko{ color:var(--muted); font-size:.88rem; }

.mistake-list{ margin:.6rem 0; }
.mistake-item{ padding:.4rem 0; border-bottom:1px dashed var(--line); font-size:.92rem;}
.mistake-item:last-child{border-bottom:none;}
.wrong{ color:var(--bad); font-weight:700; }
.right{ color:var(--good); font-weight:700; }
.mnote{ color:var(--muted); font-size:.85rem; display:block; margin-top:.15rem;}

.tts{ border:none; background:#f1ece0; border-radius:50%; width:1.9rem; height:1.9rem; flex:none; font-size:.85rem; }
.tts:hover{ background:var(--gold); }
.tts:active{ transform:scale(.92); }

/* vocab */
.vocab-group{ margin-bottom:1.4rem; }
.vocab-group h3{ font-size:1.05rem; }
.vocab-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:.6rem; }
.vword{ background:#fbfaf6; border:1px solid var(--line); border-radius:10px; padding:.6rem .7rem; }
.vword .de{ font-weight:700; display:flex; align-items:center; gap:.4rem; }
.vword .ko{ color:var(--muted); font-size:.88rem; margin:.15rem 0;}
.vword .ex{ font-size:.82rem; color:#555; border-top:1px dashed var(--line); margin-top:.35rem; padding-top:.35rem; display:flex; gap:.35rem; align-items:flex-start;}

/* conversation */
.dialog{ background:#fbfaf6; border:1px solid var(--line); border-radius:12px; padding:1rem 1.1rem; margin-bottom:1.2rem; }
.dialog h3{ margin-top:0; font-size:1.02rem; }
.dialog .note{ color:var(--muted); font-size:.85rem; margin-bottom:.6rem;}
.dline{ display:flex; gap:.6rem; align-items:flex-start; padding:.45rem 0; border-bottom:1px dashed var(--line); }
.dline:last-child{ border-bottom:none; }
.sp{ font-weight:800; color:var(--accent); width:1.4rem; flex:none; }
.dtext{ flex:1; }
.dtext .de{ font-weight:600; }
.dtext .ko{ color:var(--muted); font-size:.85rem; }
.reveal-btn{ background:none; border:1px solid var(--gold); color:var(--gold); border-radius:999px; padding:.1rem .6rem; font-size:.78rem; margin-left:.4rem;}
.reveal-btn.done{ background:var(--gold); color:#fff; }

/* quiz */
.quiz-item{ background:#fbfaf6; border:1px solid var(--line); border-radius:12px; padding:.8rem 1rem; margin-bottom:.8rem; }
.quiz-q{ font-weight:600; margin-bottom:.5rem; }
.quiz-row{ display:flex; gap:.5rem; flex-wrap:wrap; }
.quiz-row input{ flex:1; min-width:160px; padding:.5rem .6rem; border:1px solid var(--line); border-radius:8px; font-size:.95rem; }
.quiz-row button{ background:var(--accent); color:#fff; border:none; border-radius:8px; padding:.5rem 1rem; font-weight:700; font-size:.88rem;}
.quiz-feedback{ margin-top:.6rem; padding:.55rem .75rem; border-radius:8px; font-size:.9rem; display:none; }
.quiz-feedback.show{ display:block; }
.quiz-feedback.ok{ background:#e7f5ec; color:var(--good); }
.quiz-feedback.no{ background:#fdece5; color:var(--bad); }
.quiz-feedback b{ display:block; margin-bottom:.15rem;}

/* videos */
.video-card{ display:flex; gap:.8rem; align-items:flex-start; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:.9rem 1rem; margin-bottom:.7rem;}
.video-card .yt{ font-size:1.4rem; }
.video-card a{ font-weight:700; text-decoration:none; }
.video-card p{ color:var(--muted); font-size:.87rem; margin:.2rem 0 0; }
.video-level{ display:inline-block; font-size:.7rem; font-weight:700; color:#fff; padding:.05rem .5rem; border-radius:5px; margin-right:.4rem;}

/* back to top */
#toTop{
  position:fixed; right:1.2rem; bottom:1.2rem; width:3rem; height:3rem; border-radius:50%;
  background:var(--ink); color:#fff; border:none; font-size:1.2rem; box-shadow:0 6px 16px rgba(0,0,0,.25);
  opacity:0; pointer-events:none; transition:.2s; z-index:60;
}
#toTop.show{ opacity:1; pointer-events:auto; }

footer{ text-align:center; color:var(--muted); font-size:.8rem; padding:2rem 1rem 1rem; }

.roadmap-wrap{ overflow-x:auto; }
.pill{ display:inline-block; padding:.1rem .5rem; border-radius:6px; font-size:.72rem; font-weight:700; color:#fff; }

@media (max-width:560px){
  .header-row{ justify-content:center; }
  nav.mainnav{ justify-content:center; }
  th,td{ font-size:.82rem; padding:.3rem .4rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand">
      <span class="flag"><div style="background:#000"></div><div style="background:#dd0000"></div><div style="background:#ffce00"></div></span>
      SY의 독일어 공부방
    </div>
    <nav class="mainnav" id="mainnav"></nav>
    <div class="tools">
      <span class="fs-label">글자크기</span>
      <button id="fsDown" title="글자 작게">가−</button>
      <button id="fsReset" title="기본 크기">가</button>
      <button id="fsUp" title="글자 크게">가+</button>
    </div>
  </div>
</header>

<main id="content"></main>

<button id="toTop" title="맨 위로">↑</button>

<footer>
  SY의 독일어 공부방 · A1 → B2 · 원본 강의노트/연습장을 바탕으로 재구성 · 발음은 브라우저 내장 음성합성(TTS)을 사용합니다 (기기에 독일어 음성이 있어야 재생됩니다)
</footer>

<script>
/* ===================== 유틸 ===================== */
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escAttr(s){
  return esc(s).replace(/"/g,"&quot;");
}
function tbl(headers, rows){
  var h = headers.map(function(x){return "<th>"+esc(x)+"</th>";}).join("");
  var b = rows.map(function(r){ return "<tr>"+r.map(function(c){return "<td>"+c+"</td>";}).join("")+"</tr>"; }).join("");
  return '<div class="tbl-wrap"><table><thead><tr>'+h+'</tr></thead><tbody>'+b+'</tbody></table></div>';
}
function ttsBtn(text){
  return '<button class="tts" data-tts="'+escAttr(text)+'" title="발음 듣기">🔊</button>';
}

/* ===================== 레벨 색상 ===================== */
var LEVEL_COLOR = { A1:"#3f9142", A2:"#1f8a8c", B1:"#2b5fa8", B2:"#9c2b57" };

        "분리동사(전철+동사, 예: aufstehen)는 평서문에서 전철이 문장 맨 끝으로 떨어져 나갑니다. 재귀동사(sich 동반)는 sich가 인칭에 맞게 mich/dich/sich… 로 바뀝니다."

      tables:[

      examples:[

function renderGrammarTopic(topic){
  var html = '<div class="gram-topic">';
  html += '<span class="tag">'+esc(topic.tag)+'</span><h3>'+esc(topic.t)+'</h3>';
  topic.body.forEach(function(p){ html += "<p>"+esc(p)+"</p>"; });
  if(topic.tables){
    topic.tables.forEach(function(tb){
      html += "<p><b>"+esc(tb.caption)+"</b></p>"+tbl(tb.headers, tb.rows.map(function(r){return r.map(function(c){return esc(c);});}));
    });
  }
  if(topic.examples && topic.examples.length){
    html += '<div class="ex-list">';
    topic.examples.forEach(function(ex){
      html += '<div class="ex-item">'+ttsBtn(ex[0])+'<div><div class="ex-de">'+esc(ex[0])+'</div><div class="ex-ko">'+esc(ex[1])+'</div></div></div>';
    });
    html += '</div>';
  }
  if(topic.why){ html += '<div class="why-box"><b>왜?</b> '+esc(topic.why)+'</div>'; }
  if(topic.tip){ html += '<div class="tip-box"><b>실전 팁</b> '+esc(topic.tip)+'</div>'; }
  if(topic.mistakes && topic.mistakes.length){
    html += '<div class="mistake-list"><p><b>한국인이 자주 하는 실수</b></p>';
    topic.mistakes.forEach(function(m){
      html += '<div class="mistake-item"><span class="wrong">✕ '+esc(m[0])+'</span> → <span class="right">✓ '+esc(m[1])+'</span><span class="mnote">'+esc(m[2])+'</span></div>';
    });
    html += '</div>';
  }
  if(topic.quiz && topic.quiz.length){
    html += '<div class="core-box"><b>스스로 확인 (가리고 풀어보세요)</b></div>';
    html += renderQuizList(topic.quiz, "gq");
  }
  html += '</div>';
  return html;
}

var quizCounter = 0;
function renderQuizList(list, prefix){
  var html = "";
  list.forEach(function(item){
    quizCounter++;
    var id = prefix+"_"+quizCounter;
    html += '<div class="quiz-item">'+
      '<div class="quiz-q">Q. '+esc(item.q)+'</div>'+
      '<div class="quiz-row">'+
      '<input type="text" id="in_'+id+'" placeholder="정답을 입력해보세요 (몰라도 확인 버튼을 눌러보세요)">'+
      '<button data-check="'+id+'" data-answer="'+escAttr(item.a)+'" data-note="'+escAttr(item.note||"")+'">확인</button>'+
      '</div>'+
      '<div class="quiz-feedback" id="fb_'+id+'"></div>'+
      '</div>';
  });
  return html;
}

function normalizeAnswer(s){
  return s.toLowerCase()
    .replace(/[.,!?„“"'’()]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function renderVocab(groups){
  var html = "";
  groups.forEach(function(grp){
    html += '<div class="vocab-group"><h3>'+esc(grp.g)+'</h3><div class="vocab-grid">';
    grp.items.forEach(function(it){
      var de = it[0], ko = it[1], ex = it[2]||"";
      html += '<div class="vword"><div class="de">'+ttsBtn(de)+' '+esc(de)+'</div><div class="ko">'+esc(ko)+'</div>';
      if(ex){ html += '<div class="ex">'+ttsBtn(ex)+' <span>'+esc(ex)+'</span></div>'; }
      html += '</div>';
    });
    html += '</div></div>';
  });
  return html;
}

var dialogCounter = 0;
function renderConversation(list){
  var html = "";
  list.forEach(function(d){
    html += '<div class="dialog"><h3>'+esc(d.t)+'</h3>';
    if(d.note){ html += '<div class="note">'+esc(d.note)+'</div>'; }
    d.lines.forEach(function(line){
      var sp = line[0], de = line[1], ko = line[2], full = line[3] || de;
      var hasBlank = de.indexOf("___") !== -1;
      dialogCounter++;
      var did = "dl_"+dialogCounter;
      html += '<div class="dline"><span class="sp">'+esc(sp)+'</span><div class="dtext">';
      html += '<div class="de" id="txt_'+did+'">'+ttsBtn(hasBlank ? full : de)+' '+esc(de)+
        (hasBlank ? ' <button class="reveal-btn" data-reveal="'+did+'" data-full="'+escAttr(full)+'">정답</button>' : '')+
        '</div>';
      if(ko){ html += '<div class="ko">'+esc(ko)+'</div>'; }
      html += '</div></div>';
    });
    html += '</div>';
  });
  return html;
}

function renderLevelPage(lv){
  var d = DATA[lv];
  var subtabs = [["grammar","문법"],["vocab","단어"],["conversation","회화"],["quiz","퀴즈"]];
  if(lv==="B2") subtabs.push(["exam","B2 시험대비"]);
  subtabs.push(["videos","영상"]);

  var html = '<div class="level-header">'+levelBadge(lv)+'<div><h2 style="margin:0">'+esc(d.title)+'</h2><div class="goal">'+esc(d.blurb)+'</div></div></div>';

  html += '<div class="subtabs">';
  subtabs.forEach(function(st){
    var active = (state.subtab===st[0]) ? " active" : "";
    html += '<button class="'+active.trim()+'" data-subtab="'+st[0]+'">'+st[1]+'</button>';
  });
  html += '</div>';

  html += '<div id="subcontent">';
  if(state.subtab==="grammar"){
    d.g.forEach(function(topic){ html += renderGrammarTopic(topic); });
  } else if(state.subtab==="vocab"){
    html += renderVocab(d.v);
  } else if(state.subtab==="conversation"){
    html += renderConversation(d.c);
  } else if(state.subtab==="quiz"){
    html += '<div class="card"><h2>'+lv+' 총정리 퀴즈</h2>'+renderQuizList(d.quiz, "lq_"+lv)+'</div>';
  } else if(state.subtab==="exam" && d.exam){
    var ex = d.exam;
    html += '<div class="card"><h2>B2 시험 한눈에 보기</h2><p>'+esc(ex.intro)+'</p>'+
      tbl(ex.goetheTable.headers, ex.goetheTable.rows)+
      '<p style="color:var(--muted); font-size:.88rem;">'+esc(ex.goetheNote)+'</p>'+
      '<p>'+esc(ex.telcNote)+'</p></div>';
    html += '<div class="card"><h2>쓰기 (Schreiben) 전략</h2>'+
      tbl(ex.writingTable.headers, ex.writingTable.rows)+
      '<div class="core-box">'+esc(ex.writingTask)+'</div></div>';
    html += '<div class="card"><h2>말하기 (Sprechen) 전략</h2>'+
      tbl(ex.speakingTable.headers, ex.speakingTable.rows)+
      '<div class="core-box">'+esc(ex.speakingTask)+'</div></div>';
    html += '<div class="card"><h2>시험 직전 4주 플랜</h2>'+tbl(ex.planTable.headers, ex.planTable.rows)+
      '<p><b>시험 꿀팁</b></p><ul>'+ex.tips.map(function(t){return "<li>"+esc(t)+"</li>";}).join("")+'</ul></div>';
    html += '<div class="card"><h2>공식 자료</h2>'+renderVideos(ex.links, false)+'</div>';
  } else if(state.subtab==="videos"){
    html += '<div class="card">'+renderVideos(d.vid, false)+'</div>';
  }
  html += '</div>';
  return html;
}

function render(){
  renderNav();
  var el = document.getElementById("content");
  quizCounter = 0; dialogCounter = 0;
  if(state.route==="home"){ el.innerHTML = renderHome(); }
  else if(state.route==="appendix"){ el.innerHTML = renderAppendix(); }
  else if(state.route==="videos"){ el.innerHTML = renderVideosPage(); }
  else if(DATA[state.route]){ el.innerHTML = renderLevelPage(state.route); }
  else { el.innerHTML = renderHome(); }
  window.scrollTo({top:0, behavior:"instant" in window ? "instant" : "auto"});
}

/* ===================== 이벤트 ===================== */
document.addEventListener("click", function(e){
  var navBtn = e.target.closest("[data-route]");
  if(navBtn){
    state.route = navBtn.getAttribute("data-route");
    if(DATA[state.route]) state.subtab = "grammar";
    saveState();
    render();
    return;
  }
  var goCard = e.target.closest("[data-goto]");
  if(goCard){
    state.route = goCard.getAttribute("data-goto");
    state.subtab = "grammar";
    saveState();
    render();
    return;
  }
  var subBtn = e.target.closest("[data-subtab]");
  if(subBtn){
    state.subtab = subBtn.getAttribute("data-subtab");
    render();
    return;
  }
  var ttsBtnEl = e.target.closest(".tts");
  if(ttsBtnEl){
    speakDE(ttsBtnEl.getAttribute("data-tts"));
    return;
  }
  var checkBtn = e.target.closest("[data-check]");
  if(checkBtn){
    var id = checkBtn.getAttribute("data-check");
    var answer = checkBtn.getAttribute("data-answer");
    var note = checkBtn.getAttribute("data-note");
    var input = document.getElementById("in_"+id);
    var fb = document.getElementById("fb_"+id);
    var userVal = input ? input.value : "";
    var accepted = answer.split("|").map(normalizeAnswer);
    var norm = normalizeAnswer(userVal);
    var isCorrect = norm.length>0 && accepted.indexOf(norm) !== -1;
    fb.className = "quiz-feedback show " + (isCorrect ? "ok" : "no");
    fb.innerHTML = "<b>"+(isCorrect ? "✓ 정답입니다!" : (norm.length>0 ? "✗ 다시 확인해보세요" : "정답 확인"))+"</b>"+
      '<div style="margin-top:.3rem;">정답: <b>'+esc(answer.replace(/\|/g," / "))+'</b> '+ttsBtn(answer.split("|")[0])+'</div>'+
      (note ? '<div style="margin-top:.2rem; color:var(--muted);">'+esc(note)+'</div>' : "");
    return;
  }
  var revealBtn = e.target.closest("[data-reveal]");
  if(revealBtn){
    var did = revealBtn.getAttribute("data-reveal");
    var full = revealBtn.getAttribute("data-full");
    var txt = document.getElementById("txt_"+did);
    txt.innerHTML = ttsBtn(full)+' '+esc(full)+' <button class="reveal-btn done">✓ 정답 확인됨</button>';
    return;
  }
});

document.addEventListener("keydown", function(e){
  if(e.key==="Enter" && e.target.tagName==="INPUT" && e.target.id.indexOf("in_")===0){
    var row = e.target.closest(".quiz-row");
    if(row){ var btn = row.querySelector("[data-check]"); if(btn) btn.click(); }
  }
});

/* ===================== TTS ===================== */
var germanVoice = null;
function pickVoice(){
  if(!window.speechSynthesis) return;
  var voices = speechSynthesis.getVoices();
  germanVoice = voices.find(function(v){ return v.lang && v.lang.toLowerCase().indexOf("de")===0; }) || null;
}
if(window.speechSynthesis){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speakDE(text){
  if(!window.speechSynthesis){ alert("이 브라우저는 음성 합성을 지원하지 않습니다."); return; }
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = "de-DE";
  u.rate = 0.92;
  if(germanVoice) u.voice = germanVoice;
  speechSynthesis.speak(u);
}

/* ===================== 글자 크기 ===================== */
function applyFontSize(px){
  document.documentElement.style.fontSize = px+"px";
  try{ localStorage.setItem("de_fs", px); }catch(e){}
}
document.getElementById("fsUp").addEventListener("click", function(){
  var cur = parseInt(getComputedStyle(document.documentElement).fontSize,10) || 17;
  applyFontSize(Math.min(cur+1, 24));
});
document.getElementById("fsDown").addEventListener("click", function(){
  var cur = parseInt(getComputedStyle(document.documentElement).fontSize,10) || 17;
  applyFontSize(Math.max(cur-1, 13));
});
document.getElementById("fsReset").addEventListener("click", function(){ applyFontSize(17); });

/* ===================== 맨 위로 ===================== */
var toTopBtn = document.getElementById("toTop");
window.addEventListener("scroll", function(){
  if(window.scrollY > 350) toTopBtn.classList.add("show");
  else toTopBtn.classList.remove("show");
});
toTopBtn.addEventListener("click", function(){
  window.scrollTo({top:0, behavior:"smooth"});
});

/* ===================== 상태 저장 ===================== */
function saveState(){
  try{ localStorage.setItem("de_route", state.route); }catch(e){}
}
function loadState(){
  try{
    var savedFs = localStorage.getItem("de_fs");
    if(savedFs) document.documentElement.style.fontSize = savedFs+"px";
    var savedRoute = localStorage.getItem("de_route");
    if(savedRoute && (DATA[savedRoute] || savedRoute==="home" || savedRoute==="appendix" || savedRoute==="videos")){
      state.route = savedRoute;
    }
  }catch(e){}
}

/* ===================== 시작 ===================== */
loadState();
render();
</script>
