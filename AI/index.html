<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AX Sprint 7 Days | AI 도구 실무 과외</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.78);
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(29, 29, 31, 0.11);
      --accent: #75511d;
      --accent-2: #b58a45;
      --blue: #0071e3;
      --soft: #fbf7ee;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      --radius: 8px;
      --font-scale: 1;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: calc(16px * var(--font-scale));
      letter-spacing: 0;
    }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      display: grid;
      grid-template-columns: 304px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      background: rgba(246, 246, 248, 0.92);
      backdrop-filter: blur(22px);
      border-right: 1px solid var(--line);
      overflow-y: auto;
      z-index: 10;
    }

    .brand {
      padding: 10px 10px 22px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }

    .brand-kicker {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .brand h1 {
      margin: 8px 0 8px;
      font-size: 1.35rem;
      line-height: 1.12;
    }

    .brand p {
      color: var(--muted);
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .progress-box {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.04);
      margin-bottom: 16px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .bar {
      height: 8px;
      background: #e7e7ea;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .nav-button {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 11px 10px;
      border-radius: var(--radius);
      color: var(--ink);
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 8px;
      align-items: center;
      margin: 3px 0;
    }

    .nav-button:hover,
    .nav-button.active {
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .nav-day {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #e9e9ec;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
    }

    .nav-button.done .nav-day {
      background: var(--accent);
      color: #fff;
    }

    .nav-title {
      font-size: 0.91rem;
      line-height: 1.28;
      font-weight: 700;
    }

    .content {
      min-width: 0;
      padding: 28px clamp(18px, 5vw, 72px) 80px;
    }

    .hero {
      min-height: 430px;
      display: grid;
      align-items: end;
      padding: clamp(28px, 6vw, 64px);
      color: white;
      background:
        linear-gradient(120deg, rgba(0,0,0,0.62), rgba(0,0,0,0.18)),
        url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1800&q=85") center/cover;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 26px;
    }

    .hero h2 {
      margin: 0;
      max-width: 920px;
      font-size: clamp(2.2rem, 6vw, 5.6rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 720px;
      margin: 18px 0 0;
      font-size: clamp(1rem, 2vw, 1.35rem);
      line-height: 1.55;
      color: rgba(255,255,255,0.86);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 26px;
    }

    .pill {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #3b3b3d;
    }

    .section {
      margin: 28px 0;
    }

    .section h3 {
      margin: 0 0 14px;
      font-size: clamp(1.5rem, 3vw, 2.45rem);
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.04);
    }

    .card h4 {
      margin: 0 0 8px;
      font-size: 1.02rem;
    }

    .card p, .card li {
      color: var(--muted);
      line-height: 1.58;
      margin: 0;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(7, minmax(170px, 1fr));
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .day-chip {
      border: 1px solid var(--line);
      background: white;
      border-radius: var(--radius);
      padding: 14px;
      text-align: left;
      min-height: 142px;
    }

    .day-chip strong {
      display: block;
      font-size: 0.86rem;
      color: var(--blue);
      margin-bottom: 8px;
    }

    .day-chip span {
      display: block;
      font-weight: 800;
      line-height: 1.34;
      margin-bottom: 8px;
    }

    .day-chip small {
      color: var(--muted);
      line-height: 1.45;
    }

    .page-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .page-title h2 {
      margin: 0;
      font-size: clamp(2.1rem, 5vw, 4.6rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .complete {
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: white;
      padding: 11px 17px;
      font-weight: 800;
      white-space: nowrap;
    }

    .complete.done {
      background: var(--accent);
    }

    .summary {
      background: var(--soft);
      border: 1px solid rgba(117, 81, 29, 0.18);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 18px;
      line-height: 1.7;
      box-shadow: 0 12px 32px rgba(117, 81, 29, 0.08);
    }

    .video-wrap {
      background: #111;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 16 / 9;
      box-shadow: var(--shadow);
      margin: 18px 0 8px;
    }

    .video-block + .video-block {
      margin-top: 24px;
    }

    .video-label {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: #f5efe6;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 900;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .video-note {
      color: var(--muted);
      font-size: 0.86rem;
      margin-bottom: 24px;
    }

    .video-note a {
      color: var(--blue);
      font-weight: 800;
      text-decoration: none;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(310px, 0.75fr);
      gap: 16px;
      align-items: start;
    }

    ul.clean {
      margin: 0;
      padding-left: 20px;
    }

    ul.clean li {
      margin: 10px 0;
      line-height: 1.62;
    }

    .checklist {
      display: grid;
      gap: 10px;
    }

    .check {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 10px;
      align-items: start;
      line-height: 1.55;
      color: #3b3b3d;
    }

    .check input { width: 18px; height: 18px; margin-top: 3px; accent-color: var(--accent); }

    .prompt-list {
      display: grid;
      gap: 14px;
    }

    .prompt-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 10px 26px rgba(0,0,0,0.04);
    }

    .prompt-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .prompt-head strong { line-height: 1.32; }
    .copy {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 8px 12px;
      color: var(--blue);
      font-weight: 800;
      white-space: nowrap;
    }

    pre {
      margin: 0;
      padding: 16px;
      white-space: pre-wrap;
      word-break: keep-all;
      line-height: 1.58;
      color: #2f2f31;
      background: #fbfbfd;
      font-family: "SF Mono", Consolas, "D2Coding", monospace;
      font-size: 0.9rem;
    }

    .resources-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0;
    }

    .primary {
      border: 0;
      background: var(--blue);
      color: white;
      border-radius: 999px;
      padding: 11px 17px;
      font-weight: 800;
    }

    .secondary {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 999px;
      padding: 11px 17px;
      font-weight: 800;
    }

    .float-tools {
      position: fixed;
      right: 22px;
      bottom: 26px;
      display: grid;
      gap: 14px;
      z-index: 30;
    }

    .float-tools button {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 0;
      color: #fff;
      background: #1f1f21;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      font-weight: 900;
      font-size: 1.08rem;
    }

    .float-tools button:last-child { background: var(--accent); font-size: 1.7rem; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      background: rgba(29,29,31,0.92);
      color: white;
      border-radius: 999px;
      padding: 11px 16px;
      z-index: 40;
      font-weight: 700;
      animation: fade 1.8s ease forwards;
    }

    .auth-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(120deg, rgba(0,0,0,0.58), rgba(0,0,0,0.12)),
        url("https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1800&q=85") center/cover;
    }

    .auth-card {
      width: min(100%, 440px);
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(255,255,255,0.58);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      padding: 28px;
    }

    .auth-card h1 {
      margin: 8px 0 10px;
      font-size: clamp(2rem, 8vw, 3.8rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .auth-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    .auth-card label {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .auth-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .auth-row input {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      padding: 12px 15px;
      outline: none;
    }

    .auth-row input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(0,113,227,0.12);
    }

    .auth-row button {
      border: 0;
      border-radius: 999px;
      background: var(--ink);
      color: white;
      padding: 12px 17px;
      font-weight: 900;
    }

    .auth-error {
      margin-top: 12px;
      color: #b42318;
      font-weight: 800;
      font-size: 0.9rem;
    }

    @keyframes fade {
      0% { opacity: 0; transform: translate(-50%, 10px); }
      15%, 80% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, 10px); }
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .nav-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 4px;
      }
      .two-col, .grid { grid-template-columns: 1fr; }
      .page-title { align-items: start; flex-direction: column; }
    }

    @media (max-width: 620px) {
      .content { padding: 18px 14px 110px; }
      .hero { min-height: 380px; padding: 26px; }
      .nav-list { grid-template-columns: 1fr; }
      .float-tools { right: 14px; bottom: 18px; }
      .float-tools button { width: 58px; height: 58px; }
      .prompt-head { align-items: start; flex-direction: column; }
      .auth-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const videos = {

      2: [

      4: [
        { id: "0PMgmjSyues", title: "구글 제미나이 딥 리서치 최신 기능" },
        { id: "anm63X28lGU", title: "(무료) 제미나이 'Gems' 기능 활용법! 나만의 업무 자동화 비서 만드는 방법!" }
      ],
      5: { id: "yv27HJCokFg", title: "직장인을 위한 Codex 업무 자동화 도구 활용법" },
      6: { id: "dRPYfp08oWw", title: "AI한테 SKU 1,000개 재고관리 시켜봤습니다 (결과 실화냐)" },
      7: [

        { id: "-gIjNxgo78Q", title: "AI 모델 여러 개 쓰는데 관리자가 없다? 기업 79%가 겪은 '통제 격차'" }

    const days = [
      {
        day: 1,
        title: "프롬프트 엔지니어링 기초",
        goal: ["역할, 맥락, 예시, 출력 형식만 잡아도 결과 품질이 급상승합니다.", "Claude, ChatGPT, Gemini의 응답 성향 차이를 업무별로 구분합니다.", "이메일, 보고서, 회의록 프롬프트를 바로 업무 템플릿으로 만듭니다."],
        concepts: [
          "역할: '대기업 독일법인 SCM/리테일 분석팀 시니어 애널리스트'처럼 판단 기준을 선명하게 지정합니다.",
          "맥락: 제품군, 국가, 채널, 주차, KPI를 함께 넣어야 그럴듯한 일반론을 피할 수 있습니다.",
          "예시: 좋은 보고서 문장 1개와 나쁜 문장 1개를 주면 톤 보정이 빠릅니다.",
          "출력 형식: 표, 3줄 요약, 의사결정 옵션, 리스크 순으로 고정하면 재사용성이 생깁니다.",
          "도구 차이: Claude는 긴 문서 구조화, ChatGPT는 데이터 분석과 반복 템플릿, Gemini는 웹/Workspace 맥락에 강점을 둡니다."
        ],
        tasks: ["최근 작성한 업무 이메일 1개를 가져와 역할/맥락/출력 형식으로 재작성한다.", "동일 프롬프트를 Claude, ChatGPT, Gemini에 넣고 결과 차이를 표로 비교한다.", "팀장 보고용 3줄 요약 버전과 실무자 액션 버전을 각각 만든다.", "반복 사용할 프롬프트 3개를 리소스 페이지에 보관한다."],
        prompts: [
          ["임원 보고 메일 초안", "당신은 대기업 독일법인 리테일 운영 담당자의 보고서 코치입니다.\n맥락: [제품군], [국가/채널], [기간], [핵심 이슈]가 있습니다.\n목표: 독일법인 임원에게 보낼 이메일 초안을 작성합니다.\n조건: 1) 첫 문단 3줄 이내 2) 숫자는 표로 정리 3) 요청사항은 명확한 액션 3개 4) 리스크와 다음 확인 항목 포함.\n출력: 제목 3개, 본문, 후속 질문 5개."],
          ["보고서 구조 설계", "아래 메모를 바탕으로 SCM/리테일 주간 보고서 목차를 설계해 주세요.\n메모: [붙여넣기]\n독자: AX 부서장, 영업 운영 리더\n출력 형식: 핵심 요약 3줄, 현황 표, 원인 가설, 의사결정 옵션, 다음 주 액션.\n주의: 일반론 금지. 데이터가 부족한 부분은 '추가 확인 필요'로 표시."],
          ["회의록 액션 추출", "다음 회의록에서 실행 항목만 뽑아 주세요.\n회의록: [붙여넣기]\n출력: 담당자, 마감일, 액션, 의존 데이터, 리스크, 확인 질문.\n제조/유통 실무 맥락에 맞게 표현을 짧고 명확하게 다듬어 주세요."]
        ]
      },
      {
        day: 2,
        title: "Claude 심화: Projects, Artifacts, Skills, Cowork",
        goal: ["Projects로 팀 지식 베이스를 만들고 문서 품질을 균일화합니다.", "Artifacts로 대시보드와 문서 초안을 빠르게 시각화합니다.", "비개발자도 Claude Cowork 방식으로 분석 업무를 위임하는 법을 익힙니다."],

              <div className="brand-kicker">AX Sprint 7 Days</div>
              <h1>AI 도구 실무 과외</h1>
              <p>Claude, ChatGPT, Gemini로 자동화·분석·전략 수립까지 1주일에 끝냅니다.</p>
            </div>
            <div className="progress-box">
              <div className="progress-top">
                <span>진도율</span>
                <span>{completed}/7 · {progress}%</span>
              </div>
              <div className="bar"><span style={{ width: `${progress}%` }} /></div>
            </div>
            <nav className="nav-list">
              <button className={`nav-button ${page === "home" ? "active" : ""}`} onClick={() => navTo("home")}>
                <span className="nav-day">H</span><span className="nav-title">랜딩 / 전체 보기</span>
              </button>
              {days.map(d => (
                <button key={d.day} className={`nav-button ${page === d.day ? "active" : ""} ${done[d.day] ? "done" : ""}`} onClick={() => navTo(d.day)}>
                  <span className="nav-day">{done[d.day] ? "✓" : d.day}</span>
                  <span className="nav-title">Day {d.day}<br />{d.title}</span>
                </button>
              ))}
              <button className={`nav-button ${page === "resources" ? "active" : ""}`} onClick={() => navTo("resources")}>
                <span className="nav-day">R</span><span className="nav-title">리소스 / 템플릿</span>
              </button>
            </nav>
          </aside>

          <main className="content">
            {page === "home" && <Home navTo={navTo} />}
            {typeof page === "number" && (
              <DayPage
                day={days.find(d => d.day === page)}
                done={!!done[page]}
                setDone={() => setDone(prev => ({ ...prev, [page]: !prev[page] }))}
                checks={checks[page] || {}}
                setCheck={(idx) => setChecks(prev => ({ ...prev, [page]: { ...(prev[page] || {}), [idx]: !(prev[page] || {})[idx] } }))}
                copyText={copyText}
              />
            )}
            {page === "resources" && <Resources days={days} copyText={copyText} allPromptText={allPromptText} downloadPrompts={downloadPrompts} />}
          </main>

          <div className="float-tools" aria-label="화면 도구">
            <button onClick={() => changeFont(0.05)} aria-label="글자 크게">A+</button>
            <button onClick={() => changeFont(-0.05)} aria-label="글자 작게">A-</button>
            <button onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} aria-label="맨 위로">↑</button>
          </div>
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    function PasswordGate({ authCode, setAuthCode, authError, submitPassword }) {
      return (
        <main className="auth-screen">
          <form className="auth-card" onSubmit={submitPassword}>
            <div className="brand-kicker">Private AX Class</div>
            <h1>AI 도구 실무 과외</h1>
            <p>업무 프로세스 자동화, 데이터 분석, 전략 수립을 위한 1주일 집중 교육 페이지입니다. 전달받은 접속 암호를 입력해 주세요.</p>
            <label htmlFor="access-code">접속 암호</label>
            <div className="auth-row">
              <input
                id="access-code"
                type="password"
                inputMode="numeric"
                autoComplete="current-password"
                value={authCode}
                onChange={(e) => setAuthCode(e.target.value)}
                placeholder="암호 입력"
                autoFocus
              />
              <button type="submit">입장</button>
            </div>
            {authError && <div className="auth-error">{authError}</div>}
          </form>
        </main>
      );
    }

    function Home({ navTo }) {
      return (
        <>
          <section className="hero">
            <div>
              <h2>쪽집게 과외처럼, 핵심만 바로 업무에.</h2>
              <p>대기업 AX 실무자를 위한 7일 완성 온라인 코스. 이론을 길게 돌지 않고, 프롬프트·데이터 분석·자동화·전략 문서까지 매일 하나씩 끝냅니다.</p>
            </div>
          </section>
          <div className="pill-row">
            <span className="pill">1일 1~2시간</span>
            <span className="pill">SCM / 리테일 맥락</span>
            <span className="pill">복사 가능한 프롬프트</span>
            <span className="pill">Claude · ChatGPT · Gemini</span>
          </div>
          <section className="section">
            <h3>학습 목표</h3>
            <div className="grid">
              <div className="card"><h4>자동화</h4><p>반복 보고서, 데이터 정리, 가격 모니터링 요구사항을 AI에게 정확히 위임합니다.</p></div>
              <div className="card"><h4>데이터 분석</h4><p>CSV/엑셀에서 이상치, 품절 위험, 채널별 성과를 빠르게 뽑고 검증합니다.</p></div>
              <div className="card"><h4>전략 수립</h4><p>팀 단위 AX 로드맵과 거버넌스 체크리스트를 임원 보고용으로 만듭니다.</p></div>
            </div>
          </section>
          <section className="section">
            <h3>빠진 부분 체크</h3>
            <div className="grid">
              {gapChecks.map(([name, detail]) => (
                <div className="card" key={name}>
                  <h4>{name}</h4>
                  <p>{detail}</p>
                </div>
              ))}
            </div>
          </section>
          <section className="section">
            <h3>추가 확장 모듈</h3>
            <div className="grid">
              {advancedModules.map(([name, detail]) => (
                <div className="card" key={name}>
                  <h4>{name}</h4>
                  <p>{detail}</p>
                </div>
              ))}
            </div>
          </section>
          <section className="section">
            <h3>커리큘럼 한눈에 보기</h3>
            <div className="timeline">
              {days.map(d => (
                <button className="day-chip" key={d.day} onClick={() => navTo(d.day)}>
                  <strong>Day {d.day}</strong>
                  <span>{d.title}</span>
                  <small>{d.goal[0]}</small>
                </button>
              ))}
            </div>
          </section>
          <section className="section">
            <div className="summary">
              <strong>운영 방식:</strong> 매일 영상 20~40분, 핵심 개념 20분, 실습 40~60분. 최종 결과물은 팀에 바로 공유 가능한 3개월 AI 도입 전략 문서입니다.
            </div>
          </section>
        </>
      );
    }

    function DayPage({ day, done, setDone, checks, setCheck, copyText }) {
      const dayVideos = Array.isArray(videos[day.day]) ? videos[day.day] : [videos[day.day]];
      return (
        <>
          <div className="page-title">
            <h2>Day {day.day}<br />{day.title}</h2>
            <button className={`complete ${done ? "done" : ""}`} onClick={setDone}>{done ? "완료됨 ✓" : "Day 완료 체크"}</button>
          </div>
          <div className="summary">
            {day.goal.map((g, i) => <div key={i}>{g}</div>)}
          </div>
          {dayVideos.map((video, index) => (
            <div className="video-block" key={video.id}>
              {dayVideos.length > 1 && <div className="video-label">추천 영상 {index + 1}</div>}
              <div className="video-wrap">
                <iframe
                  src={`https://www.youtube.com/embed/${video.id}`}
                  title={video.title}
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowFullScreen
                />
              </div>
              <div className="video-note">
                현재 영상: {video.title} · <a href={`https://www.youtube.com/watch?v=${video.id}`} target="_blank" rel="noreferrer">YouTube 원본 열기</a>.
                추후 한글 강의 큐레이션 URL로 `videos` 객체의 YouTube ID만 교체하면 됩니다.
              </div>
            </div>
          ))}

          <div className="two-col">
            <section className="section card">
              <h3>핵심 개념</h3>
              <ul className="clean">
                {day.concepts.map((c, i) => <li key={i}>{c}</li>)}
              </ul>
            </section>
            <section className="section card">
              <h3>실습 과제</h3>
              <div className="checklist">
                {day.tasks.map((task, i) => (
                  <label className="check" key={i}>
                    <input type="checkbox" checked={!!checks[i]} onChange={() => setCheck(i)} />
                    <span>{task}</span>
                  </label>
                ))}
              </div>
            </section>
          </div>

          <section className="section">
            <h3>바로 쓰는 프롬프트</h3>
            <div className="prompt-list">
              {day.prompts.map(([name, text], i) => (
                <PromptCard key={i} name={name} text={text} copyText={copyText} />
              ))}
            </div>
          </section>
        </>
      );
    }

    function PromptCard({ name, text, copyText }) {
      return (
        <div className="prompt-card">
          <div className="prompt-head">
            <strong>{name}</strong>
            <button className="copy" onClick={() => copyText(text)}>복사</button>
          </div>
          <pre>{text}</pre>
        </div>
      );
    }

    function Resources({ days, copyText, allPromptText, downloadPrompts }) {
      return (
        <>
          <div className="page-title">
            <h2>리소스<br />프롬프트 템플릿</h2>
          </div>
          <div className="summary">
            전체 Day의 프롬프트를 한곳에 모았습니다. 팀 템플릿으로 쓰려면 먼저 회사 보안 기준에 맞게 민감 데이터 입력 금지 문구를 추가하세요.
          </div>
          <div className="resources-actions">
            <button className="primary" onClick={() => copyText(allPromptText)}>전체 복사</button>
            <button className="secondary" onClick={downloadPrompts}>TXT 다운로드</button>
          </div>
          <div className="prompt-list">
            {days.map(day => (
              <div key={day.day} className="card">
                <h3>Day {day.day}. {day.title}</h3>
                <div className="prompt-list">
                  {day.prompts.map(([name, text], i) => <PromptCard key={i} name={name} text={text} copyText={copyText} />)}
                </div>
              </div>
            ))}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
