    <div class="nav-links">

<header class="page-header">
  <div class="wrap">
    <div class="eyebrow">가장 최근 주일 기준</div>
    <h1>말씀 요약 현황</h1>
    <p>가장 최근 주일 기준, 손글씨 말씀 요약 제출 현황을 확인합니다.</p>
  </div>
</header>

<section id="content" style="display:none;">
  <div class="wrap">
    <div class="summary-bar">
      <div class="summary-pill">🗓️ 주일 날짜 <span id="sumDate">-</span></div>
      <div class="summary-pill">👥 편집부원 <span id="sumMembers">-</span>명</div>
      <div class="summary-pill">✅ 완료 <span id="sumDone">-</span>명</div>
      <div class="summary-pill">❌ 미완료 <span id="sumUndone">-</span>명</div>
    </div>
    <div class="table-scroll">
      <table class="overview-table">
        <thead>
          <tr><th>이름</th><th>말씀 요약</th></tr>
        </thead>
        <tbody id="overviewBody"></tbody>
      </table>
    </div>
    <p class="muted" style="margin-top:14px; font-size: var(--fs-sm);">✅ 완료 · ❌ 미완료 · – 아직 체크되지 않음. 개인정보 보호를 위해 이름은 마스킹되어 표시됩니다.</p>
  </div>
</section>

<footer>
  <div class="wrap">한마음 교회 청소년 1부 편집부 · winsoul.de/editorial</div>
</footer>

<script src="assets/js/config.js?v=2"></script>
<script src="assets/js/auth.js?v=2"></script>
<script src="assets/js/sheets.js?v=2"></script>
<script src="assets/js/main.js?v=2"></script>
<script>
(function(){
  function render(){
    var members = EDITORIAL_CONFIG.members;
    var s = EditorialUtils.latestSunday();
    var date = s ? s.date : null;

    document.getElementById('sumDate').textContent = date ? EditorialUtils.fmtKorean(date) : '-';
    document.getElementById('sumMembers').textContent = members.length;

    if (!date) {
      document.getElementById('overviewBody').innerHTML = '<tr><td colspan="2">등록된 일정이 없습니다.</td></tr>';
      document.getElementById('content').style.display = '';
      return;
    }

    EditorialAPI.loadScriptureAll().then(function(records){
      var map = {};
      records.forEach(function(r){ if (r.date === date) map[r.name] = r.value; });

      var done = 0, undone = 0;
      var tbody = document.getElementById('overviewBody');
      tbody.innerHTML = members.map(function(mem){
        var cell;
        if (!(mem.name in map)) {
          cell = '<span class="badge badge-gray">–</span>';
        } else if (map[mem.name]) {
          cell = '<span class="badge badge-green">완료</span>'; done++;
        } else {
          cell = '<span class="badge badge-red">미완료</span>'; undone++;
        }
        return '<tr><td>' + EditorialUtils.maskOne(mem.name) + '</td><td>' + cell + '</td></tr>';
      }).join('');
      document.getElementById('sumDone').textContent = done;
      document.getElementById('sumUndone').textContent = undone;

      document.getElementById('content').style.display = '';
    });
  }

  EditorialAuth.ready(function(){
    EditorialAPI.hydrate().then(render);
  });
})();
</script>
</body>
</html>
