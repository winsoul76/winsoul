<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>담당 & 전체 일정 | 청소년 1부 편집부</title>
<link rel="stylesheet" href="assets/css/style.css?v=2">
</head>
<body data-page="schedule">

<nav class="nav">
  <div class="wrap">
    <div class="nav-brand"><span class="dot"></span>청소년 1부 편집부</div>
    <div class="nav-links">
      <a href="index.html" data-page="home">홈</a>
      <a href="ministry.html" data-page="ministry">사역 소개·서약</a>
      <a href="schedule.html" data-page="schedule">담당·일정</a>
      <a href="lectures.html" data-page="lectures">오픈 강좌</a>
      <a href="bulletin-guide.html" data-page="bulletin">주보 가이드</a>
    </div>
  </div>
</nav>

<header class="page-header">
  <div class="wrap">
    <div class="eyebrow">1면 그림 · 2면 기사 담당</div>
    <h1>사역 담당 &amp; 전체 일정</h1>
    <p>1면 그림, 2면 기사 담당과 마감일을 한눈에 봅니다.</p>
  </div>
</header>

<section>
  <div class="wrap">
    <div class="field" style="max-width:320px;">
      <label for="memberFilter">담당자로 필터</label>
      <select id="memberFilter">
        <option value="">전체 보기</option>
      </select>
    </div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>모임</th>
            <th>1면 그림 주제</th>
            <th>1면 담당</th>
            <th>2면 기사 주제</th>
            <th>2면 담당</th>
            <th>마감</th>
          </tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
      </table>
    </div>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="section-head"><h2>편집부원 명단</h2><span class="sub">총 <span id="memberCount"></span>명</span></div>
    <div class="table-scroll">
      <table>
        <thead><tr><th>이름</th></tr></thead>
        <tbody id="memberBody"></tbody>
      </table>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">한마음 교회 청소년 1부 편집부 · winsoul.de/editorial</div>
</footer>

<script src="assets/js/config.js?v=2"></script>
<script src="assets/js/auth.js?v=2"></script>
<script src="assets/js/sheets.js?v=2"></script>
<script src="assets/js/main.js?v=2"></script>
<script>
EditorialAuth.ready(function(){
EditorialAPI.hydrate().then(function(){
  var schedule = EDITORIAL_CONFIG.schedule;
  var members = EDITORIAL_CONFIG.members;
  var today = EditorialUtils.todayISO();
  var tbody = document.getElementById('scheduleBody');
  var filterSel = document.getElementById('memberFilter');

  // 필터 값은 실제 이름(매칭용), 화면 표시는 마스킹
  filterSel.innerHTML += members.map(function(m){ return '<option value="' + m.name + '">' + EditorialUtils.maskOne(m.name) + '</option>'; }).join('');

  function containsToken(field, fullName){
    if (!field) return false;
    return field.split(',').some(function(tok){
      tok = tok.trim();
      return tok && fullName.indexOf(tok) > -1;
    });
  }
  function rowMatches(s, name){
    if (!name) return true;
    return containsToken(s.p1a, name) || containsToken(s.p2a, name);
  }

  function render(filterName){
    tbody.innerHTML = schedule.filter(function(s){ return rowMatches(s, filterName); }).map(function(s){
      var cls = [];
      if (s.meeting) cls.push('is-meeting');
      if (s.date === today) cls.push('is-today');
      else if (s.date < today) cls.push('is-past');
      return '<tr class="' + cls.join(' ') + '">' +
        '<td>' + EditorialUtils.fmtKorean(s.date) + '</td>' +
        '<td>' + (s.meeting ? '<span class="badge badge-blue">모임</span>' : '') + '</td>' +
        '<td>' + s.p1 + '</td>' +
        '<td>' + EditorialUtils.maskList(EditorialUtils.expandList(s.p1a)) + '</td>' +
        '<td>' + s.p2 + '</td>' +
        '<td>' + EditorialUtils.maskList(EditorialUtils.expandList(s.p2a)) + '</td>' +
        '<td>' + (s.deadline !== '-' ? EditorialUtils.fmtShort(s.deadline) : '-') + '</td>' +
      '</tr>';
    }).join('');
  }

  filterSel.addEventListener('change', function(){ render(filterSel.value); });
  render('');

  document.getElementById('memberCount').textContent = members.length;
  document.getElementById('memberBody').innerHTML = members.map(function(m){
    return '<tr><td>' + EditorialUtils.maskOne(m.name) + '</td></tr>';
  }).join('');
});
});
</script>
</body>
</html>
