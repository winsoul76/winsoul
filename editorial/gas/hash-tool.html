<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>비밀번호 해시 생성기 (관리용)</title>
<style>
  body{ font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; max-width:560px; margin:60px auto; padding:0 20px; color:#1d1d1f; }
  h1{ font-size:20px; }
  p{ color:#666; font-size:14px; line-height:1.6; }
  input{ width:100%; padding:12px 14px; font-size:16px; border:1px solid #ccc; border-radius:10px; box-sizing:border-box; }
  .out{ margin-top:16px; padding:14px; background:#f5f5f7; border-radius:10px; word-break:break-all; font-family:monospace; font-size:13px; }
  button{ margin-top:12px; padding:10px 18px; border-radius:100px; border:none; background:#0071e3; color:#fff; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
  <h1>🔑 비밀번호 → SHA-256 해시 생성기</h1>
  <p>
    사이트/관리자 비밀번호를 바꾸고 싶을 때 사용하세요.<br>
    1) 아래에 새 비밀번호를 입력 → 해시 값 복사<br>
    2) <code>assets/js/config.js</code>의 SITE_PASSWORD_HASH 또는 ADMIN_PASSWORD_HASH 에 붙여넣기<br>
    3) <code>gas/Code.gs</code>의 SITE_KEY_HASH 또는 ADMIN_KEY_HASH 값도 같은 해시값으로 변경 후 다시 배포<br>
    이 파일은 오프라인으로 동작하며 어디에도 전송되지 않습니다.
  </p>
  <input type="text" id="pw" placeholder="새 비밀번호 입력">
  <button onclick="run()">해시 생성</button>
  <div class="out" id="out">여기에 결과가 표시됩니다</div>

<script>
async function run(){
  var v = document.getElementById('pw').value;
  if(!v){ return; }
  var enc = new TextEncoder().encode(v);
  var buf = await crypto.subtle.digest('SHA-256', enc);
  var hex = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  document.getElementById('out').textContent = hex;
}
</script>
</body>
</html>
