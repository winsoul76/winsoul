<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>오늘의 묵상</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      padding: 48px 20px 72px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 600px; margin: 0 auto; }
    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header .date { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #86868b; margin-bottom: 10px; }
    .page-header h1 { font-size: 32px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.5px; margin-bottom: 8px; }
    .page-header .ref-title { font-size: 18px; font-weight: 500; color: #6e4c1e; }
    .card { background: #fff; border-radius: 18px; padding: 28px 32px; margin-bottom: 16px; }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #86868b; margin-bottom: 18px; }
    .passage-text { font-size: 15px; line-height: 2.15; color: #1d1d1f; }
    .passage-text p { display: flex; margin-bottom: 3px; }
    .v-num { flex: 0 0 2.1em; font-weight: 700; color: #6e4c1e; }
    .v-text { flex: 1 1 auto; }
    .term-row { display: flex; align-items: baseline; gap: 16px; padding: 11px 0; border-bottom: 0.5px solid #f0f0f0; }
    .term-row:last-child { border-bottom: none; }
    .term-name { font-size: 14px; font-weight: 600; color: #1d1d1f; min-width: 88px; flex-shrink: 0; }
    .term-desc { font-size: 14px; color: #6e6e73; line-height: 1.65; }
    .prose { font-size: 14px; color: #1d1d1f; line-height: 1.85; }
    .footer { text-align: center; font-size: 12px; color: #aeaeb2; margin-top: 16px; }
    .footer a { color: #aeaeb2; text-decoration: none; }
    .loading { text-align: center; padding: 100px 20px; color: #86868b; }
    .spinner { width: 32px; height: 32px; border: 2.5px solid #e0e0e0; border-top-color: #6e4c1e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    .loading p { font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mini-spin { display: inline-block; width: 11px; height: 11px; border: 1.5px solid #ccc; border-top-color: #999; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    .err { background: #fff2f2; border-radius: 14px; padding: 24px; color: #c0392b; font-size: 14px; text-align: center; line-height: 1.8; }
    .ai-err { font-size: 12px; color: #aeaeb2; font-style: italic; }
    .ai-link { display: inline-block; margin-top: 14px; padding: 10px 20px; background: #1d1d1f; color: #fff; border-radius: 980px; font-size: 14px; font-weight: 500; text-decoration: none; }
    .ai-link:hover { background: #3a3a3c; }
  </style>
</head>
<body>
<div class="wrap">
  <div id="loading" class="loading"><div class="spinner"></div><p>오늘의 묵상을 불러오는 중...</p></div>
  <div id="app" style="display:none"></div>
  <div id="err" class="err" style="display:none"></div>
</div>
<script>
const CODES = {
  '창세기':'gen','출애굽기':'exo','레위기':'lev','민수기':'num','신명기':'deu',
  '여호수아':'jos','사사기':'jdg','룻기':'rut','사무엘상':'sa1','사무엘하':'sa2',
  '열왕기상':'ki1','열왕기하':'ki2','역대상':'ch1','역대하':'ch2','에스라':'ezr',
  '느헤미야':'neh','에스더':'est','욥기':'job','시편':'psa','잠언':'pro',
  '전도서':'ecc','아가':'sng','이사야':'isa','예레미야':'jer','예레미야애가':'lam',
  '에스겔':'eze','다니엘':'dan','호세아':'hos','요엘':'joe','아모스':'amo',
  '오바댜':'oba','요나':'jon','미가':'mic','나훔':'nah','하박국':'hab',
  '스바냐':'zep','학개':'hag','스가랴':'zec','말라기':'mal',
  '마태복음':'mat','마가복음':'mar','누가복음':'luk','요한복음':'joh',
  '사도행전':'act','로마서':'rom','고린도전서':'co1','고린도후서':'co2',
  '갈라디아서':'gal','에베소서':'eph','빌립보서':'php','골로새서':'col',
  '데살로니가전서':'th1','데살로니가후서':'th2','디모데전서':'ti1','디모데후서':'ti2',
  '디도서':'tit','빌레몬서':'phm','히브리서':'heb','야고보서':'jam',
  '베드로전서':'pe1','베드로후서':'pe2','요한일서':'jo1','요한이서':'jo2',
  '요한삼서':'jo3','유다서':'jde','요한계시록':'rev'
};

const DAYS = ['일','월','화','수','목','금','토'];
function fmtDate(d) {
  return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 '+DAYS[d.getDay()]+'요일';
}

async function fetchPassage() {
  const r = await fetch('https://r.jina.ai/https://bible.asher.design/', {
    signal: AbortSignal.timeout(20000)
  });
  if (!r.ok) throw new Error('본문 목록 오류 (' + r.status + ')');
  return r.text();
}

async function fetchBible(book, chap) {
  const r = await fetch('https://r.jina.ai/https://www.bskorea.or.kr/bible/korbibReadpage.php?version=GAE&book=' + book + '&chap=' + chap + '&sec=1', {
    signal: AbortSignal.timeout(20000)
  });
  if (!r.ok) throw new Error('성경 본문 오류 (' + r.status + ')');
  return r.text();
}

function parseRef(text) {
  const idx = text.indexOf('묵상');
  if (idx === -1) return null;
  const snippet = text.slice(idx, idx + 150);
  // 단일 장(3:1-32) 또는 장이 바뀌는 경우(3:33-4:6) 모두 지원
  const p = snippet.match(/([가-힣]+)\s+(\d+):(\d+)[-–](?:(\d+):)?(\d+)/);
  if (!p) return null;
  return {
    book: p[1],
    chap: +p[2],
    vs: +p[3],
    chap2: p[4] ? +p[4] : +p[2],
    ve: +p[5],
    raw: p[0].trim()
  };
}

// 한 장(chapter) 텍스트를 절 단위로 모두 분리해 [{num, text}, ...] 반환
function parseAllVerses(raw) {
  let t = raw;
  // 1. 마크다운 이미지 제거
  t = t.replace(/!\[[^\]]*\]\([^)]*\)/g, '');
  // 2a. 링크+공백+조사 아티팩트 수정: [이름](url) 이 → 이름이 (이/가 포함, 링크 뒤일 때만 안전하게 적용)
  t = t.replace(/\[([^\]]+)\]\([^)]*\)\s+(이며|이고|이라|에서|에게|으로|부터|까지|에|와|과|을|를|은|는|도|의|로|만|라|이|가)(?![가-힣])/g, '$1$2');
  // 2b. 남은 마크다운 링크 → text
  t = t.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');
  // 3. 대괄호 → 내용 유지, 괄호만 제거 ([하늘로 올려지시니] → 하늘로 올려지시니)
  t = t.replace(/\[([^\]]*)\]/g, '$1');
  // 4. 볼드/이탤릭 마커 제거
  t = t.replace(/\*{1,3}([^*\n]*)\*{1,3}/g, '$1');
  // 5. HTML 태그·엔티티 제거
  t = t.replace(/<[^>]+>/g, ' ');
  t = t.replace(/&[a-z]+;/gi, ' ');
  // 6. 괄호 안 성경 구절 참조 제거 (막 16:19-20 등)
  t = t.replace(/\([^)]*\d+:\d+[^)]*\)/g, '');
  // 7. 빈 괄호 제거
  t = t.replace(/\(\s*\)/g, '');
  // 8. 숫자(절 번호)로 시작하는 단락만 유지 → 소제목 완전 제거
  const paras = t.split(/\n{2,}/);
  t = paras.filter(p => /^\s*\d/.test(p.trim()) && p.trim().length > 3).join('\n');
  // 9. 공백 정리
  t = t.replace(/\s+/g, ' ').trim();
  // 9-a. 각주 번호 제거 (4) 등)
  t = t.replace(/(?<=\s)\d+\)\s*/g, '');
  // 10. 남은 조사 공백 아티팩트 제거 (이/가는 2a에서 이미 처리되어 여기선 제외)
  t = t.replace(/([가-힣]) (라|이라|에서|에게|에|와|과|을|를|은|는|도|의|로|으로|만|이고|이며|부터|까지)(?=\s|$)/g, '$1$2');

  // 절 번호 위치를 모두 찾아 절 단위로 분리
  const marks = [...t.matchAll(/(?<!\d)(\d{1,3})\s+(?=[가-힣])/g)];
  const verses = [];
  for (let i = 0; i < marks.length; i++) {
    const num = +marks[i][1];
    const start = marks[i].index + marks[i][0].length;
    const end = (i + 1 < marks.length) ? marks[i + 1].index : t.length;
    const vt = t.slice(start, end).trim().replace(/\s+/g, ' ');
    if (vt) verses.push({ num, text: vt });
  }
  return verses;
}

function sliceVerses(all, vs, ve) {
  return all.filter(v => v.num >= vs && (ve == null || v.num <= ve));
}

function makeChatGPTLink(refRaw) {
  const q = refRaw + ' 성경 본문에 대해 아래 3가지를 존댓말로, 반드시 1. 2. 3. 형식으로 번호를 매겨 답변해 주세요.\n1. 역사적·문화적 배경\n2. 본문에 등장하는 생소하거나 어려운 단어·인물·지명의 의미\n3. 본문 내용 요약\n각 항목은 2~3문장으로 작성해 주세요.';
  return 'https://chatgpt.com/?q=' + encodeURIComponent(q);
}

function setLoadingText(msg) {
  const p = document.querySelector('#loading p');
  if (p) p.textContent = msg;
}

function renderApp(today, ref, verses) {
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'block';
  app.innerHTML =
    '<div class="page-header">' +
      '<div class="date">' + fmtDate(today) + '</div>' +
      '<h1>오늘의 묵상</h1>' +
      '<div class="ref-title">' + ref.raw + '</div>' +
    '</div>' +
    '<div class="card"><div class="section-label">본문 · 개역개정</div>' +
      '<div class="passage-text">' + verses.map(v => {
        const m = v.match(/^(\d+)\s+([\s\S]*)$/);
        return m ? '<p><span class="v-num">' + m[1] + '</span><span class="v-text">' + m[2] + '</span></p>' : '<p>' + v + '</p>';
      }).join('') + '</div>' +
    '</div>' +
    '<div class="card"><div class="section-label">역사적 배경 · 어려운 단어 · 본문 요약</div>' +
      '<div class="prose">ChatGPT에서 오늘 본문의 역사적 배경, 어려운 단어·인물·지명 설명, 요약을 확인하세요.</div>' +
      '<a class="ai-link" href="' + makeChatGPTLink(ref.raw) + '" target="_blank">ChatGPT에서 보기 →</a>' +
    '</div>';
}

async function main() {
  const today = new Date();
  const dateKey = today.toISOString().slice(0, 10);

  // 주일(일요일)은 별도 화면 표시
  if (today.getDay() === 0) {
    document.getElementById('loading').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'block';
    app.innerHTML =
      '<div class="page-header">' +
        '<div class="date">' + fmtDate(today) + '</div>' +
        '<h1>오늘의 묵상</h1>' +
      '</div>' +
      '<div class="card" style="text-align:center; padding:48px 32px;">' +
        '<div style="font-size:15px; font-weight:600; color:#1d1d1f; margin-bottom:14px;">주일 예배의 날입니다</div>' +
        '<div style="font-size:14px; color:#6e6e73; line-height:1.9;">오늘은 교회에서 드리는 주일 예배를 통해<br>말씀으로 묵상하세요.</div>' +
      '</div>';
    return;
  }

  // 0. 정적 JSON 우선 시도 (GitHub Actions가 매일 새벽 미리 생성) — 가장 빠른 경로
  try {
    const r = await fetch('./data/today.json', { signal: AbortSignal.timeout(5000), cache: 'no-store' });
    if (r.ok) {
      const data = await r.json();
      if (data.date === dateKey && !data.sunday && data.ref && data.verses) {
        renderApp(today, data.ref, data.verses);
        return;
      }
    }
  } catch (e) { /* 정적 JSON 없거나 실패 시 기존 방식으로 진행 */ }

  // 캐시 확인: 같은 날 재방문이면 네트워크 호출 없이 즉시 렌더링
  try {
    const cachedRaw = localStorage.getItem('qt_' + dateKey);
    if (cachedRaw) {
      const cached = JSON.parse(cachedRaw);
      renderApp(today, cached.ref, cached.verses);
      return;
    }
  } catch (e) { /* 캐시 파싱 실패 시 무시하고 정상 진행 */ }

  try {
    setLoadingText('오늘의 묵상 본문 확인 중...');
    const homeText = await fetchPassage();
    const ref = parseRef(homeText);
    if (!ref) throw new Error('오늘의 묵상 본문을 찾을 수 없습니다.');
    const code = CODES[ref.book];
    if (!code) throw new Error('알 수 없는 성경 책: ' + ref.book);

    setLoadingText('성경 본문 불러오는 중...');
    let verseObjs;
    if (ref.chap2 !== ref.chap) {
      // 장이 바뀌는 본문: 두 장을 모두 가져와 이어붙임
      const [text1, text2] = await Promise.all([
        fetchBible(code, ref.chap),
        fetchBible(code, ref.chap2)
      ]);
      const v1 = sliceVerses(parseAllVerses(text1), ref.vs, null);
      const v2 = sliceVerses(parseAllVerses(text2), 1, ref.ve);
      verseObjs = [...v1, ...v2];
    } else {
      const bibleText = await fetchBible(code, ref.chap);
      verseObjs = sliceVerses(parseAllVerses(bibleText), ref.vs, ref.ve);
    }
    const verses = verseObjs.map(v => v.num + ' ' + v.text);
    if (!verses.length) throw new Error('본문 텍스트를 추출하지 못했습니다.');

    // 오늘자 결과 캐싱 + 어제 이전 캐시 정리
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith('qt_') && k !== 'qt_' + dateKey)
        .forEach(k => localStorage.removeItem(k));
      localStorage.setItem('qt_' + dateKey, JSON.stringify({ ref, verses }));
    } catch (e) { /* 저장 공간 부족 등은 무시 */ }

    renderApp(today, ref, verses);

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('err');
    el.style.display = 'block';
    el.innerHTML = '불러오기 실패<br><br>' + e.message;
  }
}

main();
</script>
</body>
</html>
