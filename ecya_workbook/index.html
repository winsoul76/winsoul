<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>청소년 아카데미 워크북</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap" id="app">
    <div class="center" style="padding:60px 0;">
      <span class="spinner"></span>
      <p style="color:#888;margin-top:12px;">불러오는 중...</p>
    </div>
  </div>

  <script>
    // 배포한 Apps Script 웹앱 URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbxFo6BkTDIFUcPOR_jW297tenNCEIz-LqVDzD1_w4zyM0KJHUijHEGo4FK_OUQD_Cwi/exec';

    let CONFIG = null;
    let step = 0; // 0 = 이름/교회, 1..N = 영상 단계, N+1 = 최종 확인
    const profile = { name: '', church: '' };
    const answers = {}; // key: videoNo_qNo -> value
    let fontSize = 15; // 질문 글자 크기(px), 12~22 사이에서 조절

    loadConfig();

    async function loadConfig() {
      try {
        const res = await fetch(API_URL + '?action=formConfig');
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        CONFIG = data;
        render();
      } catch (err) {
        onError(err);
      }
    }

    function onError(err) {
      document.getElementById('app').innerHTML =
        '<div class="card center"><h2>오류가 발생했습니다</h2><p class="desc">' + escapeHtml(err && err.message ? err.message : String(err)) + '</p></div>';
    }

    function render() {
      const app = document.getElementById('app');
      const totalDots = CONFIG.videos.length + 2; // 시작 + 영상들 + 완료
      let dotsHtml = '';
      for (let i = 0; i < totalDots; i++) {
        dotsHtml += '<div class="dot' + (i <= step ? ' active' : '') + '"></div>';
      }

      const isVideoStep = step >= 1 && step <= CONFIG.videos.length;
      app.classList.toggle('video-mode', isVideoStep);
      document.body.classList.toggle('video-mode-body', isVideoStep);

      let bodyHtml = '';
      if (step === 0) {
        bodyHtml = renderProfileStep();
      } else if (isVideoStep) {
        bodyHtml = renderVideoStep(CONFIG.videos[step - 1]);
      } else {
        bodyHtml = renderReviewStep();
      }

      if (isVideoStep) {
        // 영상 단계는 영상을 화면 상단에 고정하고 질문만 스크롤되도록
        // 전체 화면을 차지하는 별도 레이아웃(video-mode)을 사용한다.
        app.innerHTML = '<div class="progress">' + dotsHtml + '</div>' + bodyHtml;
      } else {
        app.innerHTML =
          '<h1>' + escapeHtml(CONFIG.campName) + '</h1>' +
          '<p class="desc">' + escapeHtml(CONFIG.introText || '') + '</p>' +
          '<div class="progress">' + dotsHtml + '</div>' +
          bodyHtml;
      }

      bindStepEvents();
    }

    function renderProfileStep() {
      return '' +
        '<div class="notice-warning">' +
        '  <p class="notice-title">꼭 확인하세요</p>' +
        '  <p>이번 청소년 아카데미 신규 신청자는 워크북의 영상을 모두 시청하고 답변을 작성한 뒤, <b>아카데미 시작 전까지 반드시 제출</b>해야 합니다. 제출하지 않으면 입단하실 수 없습니다.</p>' +
        '</div>' +
        '<div class="card">' +
        '  <h2>참가자 정보</h2>' +
        '  <div class="field">' +
        '    <label>이름</label>' +
        '    <input type="text" id="f-name" placeholder="이름을 입력하세요" value="' + escapeAttr(profile.name) + '">' +
        '  </div>' +
        '  <div class="field">' +
        '    <label>교회 이름</label>' +
        '    <input type="text" id="f-church" placeholder="다니는 교회 이름을 입력하세요" value="' + escapeAttr(profile.church) + '">' +
        '  </div>' +
        '  <p id="profile-error" style="color:#e0483f;font-size:13px;display:none;"></p>' +
        '  <div class="btn-row"><span></span><button class="primary" id="btn-next">다음</button></div>' +
        '</div>';
    }

    function renderVideoStep(video) {
      const videoId = extractYoutubeId(video.videoURL);
      let qHtml = '';
      video.questions.forEach((q, idx) => {
        const key = video.videoNo + '_' + q.qNo;
        const savedVal = answers[key] || '';
        qHtml += '<div class="qblock">';
        qHtml += '<div class="qtitle">' + q.qNo + '. ' + escapeHtml(q.qText) + '</div>';
        if (q.qType === 'MC') {
          qHtml += '<div class="options">';
          q.options.forEach((opt, oi) => {
            const checked = savedVal === opt ? 'checked' : '';
            qHtml += '<label><input type="radio" name="q_' + key + '" value="' + escapeAttr(opt) + '" ' + checked + '> ' + escapeHtml(opt) + '</label>';
          });
          qHtml += '</div>';
        } else if (q.qType === 'BLANK') {
          qHtml += '<input type="text" id="q_' + key + '" placeholder="빈칸에 들어갈 말을 적어보세요" value="' + escapeAttr(savedVal) + '">';
        } else {
          qHtml += '<textarea id="q_' + key + '" placeholder="답변을 입력하세요">' + escapeHtml(savedVal) + '</textarea>';
        }
        qHtml += '</div>';
      });

      return '' +
        '<div class="video-fixed-wrap"><div class="video-fixed-inner">' +
        '  <div class="video-toolbar">' +
        '    <div class="vtitle">' + escapeHtml(video.videoTitle) + '</div>' +
        '    <div class="font-ctrl">' +
        '      <span>글자크기</span>' +
        '      <button type="button" id="btn-font-dec">가-</button>' +
        '      <button type="button" id="btn-font-inc">가+</button>' +
        '    </div>' +
        '  </div>' +
        (videoId
          ? '<div class="video-embed"><iframe src="https://www.youtube.com/embed/' + videoId + '" allowfullscreen></iframe></div>'
          : '<p class="desc" style="margin:0;">영상 링크가 아직 등록되지 않았습니다.</p>') +
        '</div></div>' +
        '<div class="qscroll"><div class="qscroll-inner">' +
        '<div class="card">' +
        qHtml +
        '  <p id="video-error" style="color:#e0483f;font-size:13px;display:none;margin-top:10px;"></p>' +
        '  <div class="btn-row"><button class="secondary" id="btn-prev">이전</button><button class="primary" id="btn-next">다음</button></div>' +
        '</div>' +
        '</div></div>';
    }

    function renderReviewStep() {
      return '' +
        '<div class="card">' +
        '  <h2>제출 전 확인</h2>' +
        '  <p class="desc"><b>' + escapeHtml(profile.name) + '</b> (' + escapeHtml(profile.church) + ')님, 모든 답변을 작성하셨습니다. 제출하시겠습니까?</p>' +
        '  <p id="submit-error" style="color:#e0483f;font-size:13px;display:none;"></p>' +
        '  <div class="btn-row"><button class="secondary" id="btn-prev">이전</button><button class="primary" id="btn-submit">제출하기</button></div>' +
        '</div>';
    }

    function bindStepEvents() {
      const nextBtn = document.getElementById('btn-next');
      const prevBtn = document.getElementById('btn-prev');
      const submitBtn = document.getElementById('btn-submit');
      const fontIncBtn = document.getElementById('btn-font-inc');
      const fontDecBtn = document.getElementById('btn-font-dec');

      if (nextBtn) nextBtn.addEventListener('click', onNext);
      if (prevBtn) prevBtn.addEventListener('click', () => { step--; render(); window.scrollTo({ top: 0 }); });
      if (submitBtn) submitBtn.addEventListener('click', onSubmit);
      if (fontIncBtn) fontIncBtn.addEventListener('click', () => changeFontSize(1));
      if (fontDecBtn) fontDecBtn.addEventListener('click', () => changeFontSize(-1));

      applyFontSize();
    }

    function changeFontSize(delta) {
      fontSize = Math.max(12, Math.min(22, fontSize + delta));
      applyFontSize();
    }

    function applyFontSize() {
      document.documentElement.style.setProperty('--qfont-size', fontSize + 'px');
    }

    function onNext() {
      if (step === 0) {
        const name = document.getElementById('f-name').value.trim();
        const church = document.getElementById('f-church').value.trim();
        if (!name || !church) {
          showError('profile-error', '이름과 교회 이름을 모두 입력해주세요.');
          return;
        }
        profile.name = name;
        profile.church = church;
        step++;
        render();
        window.scrollTo({ top: 0 });
        return;
      }

      const video = CONFIG.videos[step - 1];
      let allAnswered = true;
      video.questions.forEach(q => {
        const key = video.videoNo + '_' + q.qNo;
        let val = '';
        if (q.qType === 'MC') {
          const checked = document.querySelector('input[name="q_' + key + '"]:checked');
          val = checked ? checked.value : '';
        } else {
          val = document.getElementById('q_' + key).value.trim();
        }
        if (!val) allAnswered = false;
        answers[key] = val;
      });

      if (!allAnswered) {
        showError('video-error', '모든 질문에 답변해주세요.');
        return;
      }
      step++;
      render();
      window.scrollTo({ top: 0 });
    }

    async function onSubmit() {
      const submitBtn = document.getElementById('btn-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = '제출 중...';

      const answerList = [];
      CONFIG.videos.forEach(video => {
        video.questions.forEach(q => {
          const key = video.videoNo + '_' + q.qNo;
          answerList.push({
            videoNo: video.videoNo,
            videoTitle: video.videoTitle,
            qNo: q.qNo,
            questionText: q.qText,
            qType: q.qType,
            answer: answers[key] || ''
          });
        });
      });

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'submit',
            payload: { name: profile.name, church: profile.church, answers: answerList }
          })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        onSubmitSuccess();
      } catch (err) {
        showError('submit-error', err && err.message ? err.message : String(err));
        submitBtn.disabled = false;
        submitBtn.textContent = '제출하기';
      }
    }

    function onSubmitSuccess() {
      document.getElementById('app').innerHTML =
        '<div class="card success-box">' +
        '  <h2>제출이 완료되었습니다</h2>' +
        '  <p class="desc">' + escapeHtml(profile.name) + '님, 참여해주셔서 감사합니다.</p>' +
        '</div>';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
    }

    function extractYoutubeId(url) {
      if (!url) return '';
      const m = String(url).match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{6,})/);
      return m ? m[1] : '';
    }

    function escapeHtml(str) {
      return String(str == null ? '' : str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeAttr(str) {
      return escapeHtml(str).replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
