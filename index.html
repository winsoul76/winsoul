  * { box-sizing: border-box; margin: 0; padding: 0; }

  .menu-item .arrow { font-size: 18px; color: #c7c7c7; }
  .footer { margin-top: auto; padding-top: 48px; font-size: 11px; color: #c2c2c2; letter-spacing: 0.05em; }
