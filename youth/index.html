<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>2026 청소년1부 여름 수련회 준비 페이지</title>
<style>
  :root{
    --ink:#1d1d1f; --sub:#86868b; --bg:#fbfbfd; --card:#ffffff;
    --line:#e5e5e7; --accent:#0066cc; --red:#d70015; --green:#1f8a3b;
    --amber:#b8860b; --chip:#f5f5f7;
  }
  *{box-sizing:border-box;}
  html{-webkit-font-smoothing:antialiased;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI","Malgun Gothic","맑은 고딕",Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  header{
    text-align:center; padding:64px 24px 40px; max-width:720px; margin:0 auto;
  }
  header h1{margin:0 0 10px; font-size:34px; font-weight:600; letter-spacing:-0.015em;}
  header .theme{font-size:17px; color:var(--sub); margin-bottom:6px; font-weight:400;}
  header .sub{font-size:14px; color:var(--sub);}
  .dday{
    display:inline-block; margin-top:22px; background:var(--ink); color:#fff;
    border-radius:980px; padding:9px 24px; font-size:14px; font-weight:500;
    letter-spacing:-.01em;
  }
  nav{
    position:sticky; top:0; z-index:10; background:rgba(251,251,253,.82);
    -webkit-backdrop-filter:saturate(180%) blur(20px); backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--line);
  }
  #tabNav{
    display:flex; justify-content:center; gap:4px; max-width:920px; margin:0 auto;
    padding:0 16px; overflow-x:auto;
  }
  nav button{
    flex:0 0 auto; padding:16px 18px; border:none; background:transparent;
    font-size:13.5px; font-weight:500; color:var(--sub); cursor:pointer;
    border-bottom:2px solid transparent; white-space:nowrap; transition:color .15s;
  }
  nav button:hover{color:var(--ink);}
  nav button.active{color:var(--ink); border-bottom-color:var(--ink); font-weight:600;}
  main{max-width:760px; margin:0 auto; padding:32px 20px 80px;}
  section{display:none;}
  section.active{display:block; animation:fade .3s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:28px 30px; margin-bottom:20px;
  }
  .card h2{margin:0 0 16px; font-size:20px; font-weight:600; letter-spacing:-.01em; color:var(--ink);}
  .card h3{margin:24px 0 10px; font-size:14.5px; font-weight:600; color:var(--ink);}
  .card h3:first-of-type{margin-top:4px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px;}
  .stat{
    background:var(--chip); border-radius:14px;
    padding:18px 16px; text-align:center;
  }
  .stat .num{font-size:19px; font-weight:700; color:var(--ink); letter-spacing:-.01em;}
  .stat .lbl{font-size:11.5px; color:var(--sub); margin-top:4px;}
  table{width:100%; border-collapse:collapse; font-size:13px; margin-top:6px;}
  th,td{padding:10px 12px; text-align:left; vertical-align:top; border-bottom:1px solid var(--line);}
  th{background:transparent; color:var(--sub); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.03em; border-bottom:1px solid var(--ink);}
  tr:last-child td{border-bottom:none;}
  .warn{
    background:#fdecec; border-radius:12px; color:var(--red);
    padding:13px 16px; font-size:13px; font-weight:500; margin:12px 0; line-height:1.5;
  }
  .note{color:var(--sub); font-size:12px; margin-top:8px; line-height:1.5;}
  .badge{
    display:inline-block; padding:3px 10px; border-radius:980px; font-size:11px; font-weight:600;
  }
  .badge.done{background:#e4f5e9; color:var(--green);}
  .badge.progress{background:#fdf3dc; color:var(--amber);}
  .badge.todo{background:var(--chip); color:var(--sub);}
  ul.clean{margin:8px 0; padding-left:18px;}
  ul.clean li{margin-bottom:7px; font-size:13.5px;}
  .timeline{border-left:2px solid var(--line); margin-left:6px; padding-left:20px;}
  .tl-item{position:relative; margin-bottom:22px;}
  .tl-item::before{
    content:""; position:absolute; left:-25px; top:5px; width:9px; height:9px;
    border-radius:50%; background:var(--ink);
  }
  .tl-date{font-weight:600; color:var(--ink); font-size:13.5px;}
  .tl-desc{font-size:12.5px; color:var(--sub); margin-top:2px;}
  .contact-row{display:flex; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .contact-row:last-child{border-bottom:none;}
  .contact-row span{color:var(--sub);}
  .contact-row b{color:var(--ink); font-weight:500;}
  footer{text-align:center; padding:32px 20px; color:var(--sub); font-size:11.5px;}
  p{font-size:13.5px;}
  @media (max-width:600px){
    header{padding:44px 20px 28px;}
    header h1{font-size:26px;}
    .card{padding:20px 20px;}
  }

  /* ---------- Lock screen ---------- */
  .lock-overlay{
    position:fixed; inset:0; z-index:2000;
    background:linear-gradient(180deg, #fbfaf8 0%, var(--bg) 100%);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .lock-card{
    width:100%; max-width:340px; background:var(--card);
    border-radius:24px; padding:40px 30px 32px;
    box-shadow:0 10px 40px rgba(0,0,0,0.08); text-align:center;
  }
  .lock-icon{
    width:56px; height:56px; margin:0 auto 20px; border-radius:50%;
    background:#eaf2fc; display:flex; align-items:center; justify-content:center; font-size:24px;
  }
  .lock-card h2{font-size:19px; font-weight:700; letter-spacing:-0.3px; margin-bottom:6px;}
  .lock-card p{font-size:13px; color:var(--sub); margin-bottom:24px;}
  .pw-wrap{position:relative;}
  .lock-card input{
    width:100%; border:1.5px solid var(--line); border-radius:14px;
    padding:14px 46px 14px 16px; font-size:20px; text-align:center; letter-spacing:6px;
    color:var(--ink); outline:none; background:#fafafa; transition:border-color .15s ease;
  }
  .lock-card input:focus{border-color:var(--accent); background:#fff;}
  .pw-wrap #pwToggle{
    position:absolute; right:4px; top:50%; transform:translateY(-50%);
    width:36px; height:36px; border:none; background:transparent;
    font-size:16px; cursor:pointer; opacity:.55; padding:0;
  }
  .pw-wrap #pwToggle:active{opacity:1;}
  .lock-err{color:var(--red); font-size:12.5px; margin-top:10px; font-weight:500;}
  .lock-card button[type="submit"]{
    width:100%; margin-top:18px; border:none; border-radius:14px; padding:14px;
    font-size:15px; font-weight:600; color:#fff; background:var(--accent);
    cursor:pointer; transition:opacity .15s ease;
  }
  .lock-card button[type="submit"]:active{opacity:.75;}
  .lock-foot{margin-top:20px; font-size:11px; color:#c2c2c2; letter-spacing:.05em;}

  /* ---------- Hub menu (수련회 준비 / 공과 준비) ---------- */
  #hubMenu.hidden, #campView.hidden{display:none;}
  .hub-head{text-align:center; padding:56px 20px 32px; max-width:520px; margin:0 auto;}
  .hub-head h1{font-size:22px; font-weight:700; letter-spacing:-.01em; margin:0 0 8px;}
  .hub-head p{font-size:13px; color:var(--sub); margin:0;}
  .hub-menu{display:flex; flex-direction:column; gap:12px; max-width:480px; margin:0 auto; padding:0 20px 60px;}
  .hub-item{
    display:flex; align-items:center; gap:16px; background:var(--card); border:1px solid var(--line);
    border-radius:18px; padding:20px 22px; text-decoration:none; color:var(--ink); cursor:pointer;
    font:inherit; text-align:left; width:100%; box-shadow:0 1px 3px rgba(0,0,0,.04);
    transition:transform .15s ease, box-shadow .15s ease; -webkit-appearance:none;
  }
  .hub-item:hover{transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.08);}
  .hub-item-icon{font-size:26px; flex-shrink:0;}
  .hub-item-text{flex:1; display:flex; flex-direction:column; gap:3px; min-width:0;}
  .hub-item-text b{font-size:16px; font-weight:600;}
  .hub-item-text span{font-size:12.5px; color:var(--sub);}
  .hub-item-arrow{font-size:18px; color:#c7c7c7; flex-shrink:0;}
  .back-to-hub{
    display:inline-flex; align-items:center; gap:4px; background:none; border:none; color:var(--sub);
    font-size:13px; font-weight:600; cursor:pointer; padding:18px 20px 0; font-family:inherit;
  }
  .back-to-hub:hover{color:var(--ink);}
</style>
</head>
<body>

<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <h2>청1 사역 교사용 자료</h2>
    <p>담당 교사·스태프만 열람 가능합니다. 비밀번호를 입력해 주세요.</p>
    <form id="lockForm" autocomplete="off">
      <div class="pw-wrap">
        <input type="password" id="pwInput" maxlength="24" placeholder="••••••" autocomplete="off">
        <button type="button" id="pwToggle" aria-label="비밀번호 표시">👁</button>
      </div>
      <div class="lock-err" id="lockErr" style="display:none;">비밀번호가 올바르지 않습니다</div>
      <button type="submit" id="unlockBtn">확인</button>
    </form>
    <div class="lock-foot">청소년1부 · WINSOUL</div>
  </div>
</div>

  var REMEMBER_KEY = "youth2026_pw";

  var lockOverlay = document.getElementById("lockOverlay");
  var appEl = document.getElementById("app");
  var lockForm = document.getElementById("lockForm");
  var pwInput = document.getElementById("pwInput");
  var pwToggle = document.getElementById("pwToggle");
  var lockErr = document.getElementById("lockErr");

  pwToggle.addEventListener("click", function () {
    var showing = pwInput.type === "text";
    pwInput.type = showing ? "password" : "text";
    pwToggle.textContent = showing ? "👁" : "🙈";
    pwInput.focus();
  });

  function b64ToBuf(b64) {
    var bin = atob(b64);
    var buf = new Uint8Array(bin.length);
    for (var idx = 0; idx < bin.length; idx++) buf[idx] = bin.charCodeAt(idx);
    return buf;
  }

  function deriveKey(password, saltB64) {
    var salt = b64ToBuf(saltB64);
    return crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"])
      .then(function (keyMaterial) {
        return crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: salt, iterations: 150000, hash: "SHA-256" },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );
      });
  }

  function tryDecrypt(password) {
    return deriveKey(password, ENC.salt).then(function (key) {
      var iv = b64ToBuf(ENC.iv);
      var ct = b64ToBuf(ENC.data);
      return crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
    }).then(function (buf) {
      return new TextDecoder().decode(buf);
    });
  }

  function unlockWith(password) {
    return tryDecrypt(password).then(function (html) {
      appEl.innerHTML = html;
      initApp();
      lockOverlay.style.display = "none";
      appEl.style.display = "block";
      try { localStorage.setItem(REMEMBER_KEY, password); } catch (e) {}
      // 공과 준비(smallgroup) 페이지도 동일한 비밀번호를 쓰므로, 여기서 한 번
      // 인증하면 공과 준비로 이동했을 때 다시 묻지 않도록 같이 저장해 둡니다.
      try { localStorage.setItem("smallgroup2026_pw", password); } catch (e) {}
      return true;
    }).catch(function () {
      return false;
    });
  }

  lockForm.addEventListener("submit", function (e) {
    e.preventDefault();
    lockErr.style.display = "none";
    var btn = document.getElementById("unlockBtn");
    btn.disabled = true;
    unlockWith(pwInput.value).then(function (ok) {
      btn.disabled = false;
      if (!ok) {
        lockErr.style.display = "block";
        pwInput.value = "";
        pwInput.focus();
      }
    });
  });
  pwInput.addEventListener("input", function () {
    lockErr.style.display = "none";
  });

  (function initLock() {
    var saved = null;
    try { saved = localStorage.getItem(REMEMBER_KEY); } catch (e) {}
    if (saved) {
      unlockWith(saved).then(function (ok) {
        if (!ok) {
          try { localStorage.removeItem(REMEMBER_KEY); } catch (e) {}
          pwInput.focus();
        }
      });
    } else {
      pwInput.focus();
    }
  })();

  // ============================================================
  // 아래는 잠금 해제(복호화) 후에만 실행되는 초기화 로직입니다.
  // ============================================================
  function initApp() {
    const hubMenu = document.getElementById('hubMenu');
    const campView = document.getElementById('campView');
    const campBtn = document.getElementById('goCamp');
    const backBtn = document.getElementById('backToHub');
    if (campBtn && hubMenu && campView) {
      campBtn.addEventListener('click', () => {
        hubMenu.classList.add('hidden');
        campView.classList.remove('hidden');
        window.scrollTo({top:0, behavior:'smooth'});
      });
    }
    if (backBtn && hubMenu && campView) {
      backBtn.addEventListener('click', () => {
        campView.classList.add('hidden');
        hubMenu.classList.remove('hidden');
        window.scrollTo({top:0, behavior:'smooth'});
      });
    }

    const buttons = document.querySelectorAll('#tabNav button');
    const sections = document.querySelectorAll('main section');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
        window.scrollTo({top:0, behavior:'smooth'});
      });
    });

    function updateDday(){
      const target = new Date('2026-08-14T15:00:00+02:00');
      const now = new Date();
      const diffMs = target - now;
      const box = document.getElementById('ddayBox');
      if (diffMs <= 0) {
        box.textContent = '수련회 진행 중 / 종료';
        return;
      }
      const days = Math.ceil(diffMs / (1000*60*60*24));
      box.textContent = 'D-' + days + '  (출발 8/14 15:00 기준)';
    }
    updateDday();
  }
</script>
