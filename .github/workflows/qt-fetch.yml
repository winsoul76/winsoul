name: Fetch daily QT passage

on:
  schedule:
    # 매일 UTC 02:00 = 독일 현지시간 약 03:00(겨울)~04:00(여름) 실행
    # KST 자정(UTC 15:10)에 bible.asher.design이 그날 본문으로 갱신되므로
    # 그보다 한참 뒤, 독일 사용자가 깨어나기 전에 미리 받아둔다.
    - cron: '0 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch today's passage
        run: node scripts/fetch-qt.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "qt-bot"
          git config user.email "qt-bot@users.noreply.github.com"
          git add QT/data/today.json
          git diff --staged --quiet || git commit -m "Update today's QT passage"
          git push
